outputs: "### Standard Translation Output\n\n```\nTRANSLATION\n\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\nInput (English):    \"Where is the nearest\
  \ pharmacy?\"\nOutput (Spanish):   \"\xBFD\xF3nde est\xE1 la farmacia m\xE1s cercana?\"\
  \nPronunciation:      \"DON-deh es-TAH la far-MAH-see-ah mas ser-KAH-nah?\"\n\n\
  Register:           Neutral \u2014 works with usted or t\xFA\nRegional note:   \
  \   \"Farmacia\" is universal across Spanish-speaking countries\nAlternate phrasing:\
  \ \"\xBFMe puede indicar d\xF3nde hay una farmacia?\" (more polite)\n```\n\n###\
  \ Cultural Context Flag\n\n```\n\u26A0\uFE0F CULTURAL NOTE\n\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\nPhrase:    Addressing someone for the\
  \ first time in Mexico\nContext:   In Mexico, strangers and service workers are\
  \ addressed as \"usted\"\n           by default. Switching to \"t\xFA\" is a sign\
  \ of warmth and familiarity \u2014\n           but it should be initiated by the\
  \ local, not the visitor.\nTip:       Start with \"usted.\" If they use \"t\xFA\"\
  \ with you, you can match it.\n```\n\n### Emergency Translation Block\n\n```\n\U0001F6A8\
  \ EMERGENCY PHRASE\n\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
  \u2500\nEnglish:       \"I need an ambulance. This is an emergency.\"\nSpanish:\
  \       \"Necesito una ambulancia. Es una emergencia.\"\nPronunciation: \"neh-seh-SEE-toh\
  \ OO-nah am-boo-LAN-see-ah. es OO-nah eh-mer-HEN-see-ah\"\nEmergency #:   Mexico:\
  \ 911 | Spain: 112 | Most of Latin America: 911 or 112\n\nAdditional phrases:\n\
  \  \"Help!\"                \u2192 \"\xA1Auxilio!\" / \"\xA1Ayuda!\"  (ow-SEEL-ee-oh\
  \ / ah-YOO-dah)\n  \"Call the police.\"     \u2192 \"Llame a la polic\xEDa.\"  \
  \  (YAH-meh ah lah poh-lee-SEE-ah)\n  \"I am injured.\"        \u2192 \"Estoy herido/a.\"\
  \         (es-TOY eh-REE-doh/dah)\n  \"I am having chest pain.\" \u2192 \"Tengo\
  \ dolor en el pecho.\" (TEN-goh doh-LOR en el PEH-choh)\n```\n\n### Phrase Set for\
  \ a Situation\n\n```\nTRAVEL PHRASE SET \u2014 Restaurant\n\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\n\"A table for two, please.\"\n  \u2192\
  \ \"Una mesa para dos, por favor.\"     (OO-nah MEH-sah PAH-rah dohs, por fah-VOR)\n\
  \n\"Do you have a menu in English?\"\n  \u2192 \"\xBFTiene el men\xFA en ingl\xE9\
  s?\"         (TYEH-neh el meh-NOO en een-GLAYS?)\n\n\"What do you recommend?\"\n\
  \  \u2192 \"\xBFQu\xE9 me recomienda?\"               (keh meh reh-koh-MYEN-dah?)\n\
  \n\"I am allergic to [peanuts].\"\n  \u2192 \"Soy al\xE9rgico/a a los [cacahuates].\"\
  \ (soy ah-LAIR-hee-koh ah lohs kah-kah-WAH-tehs)\n  Regional: Mexico = cacahuates\
  \ | Spain = cacahuetes | South America = man\xEDes\n\n\"The check, please.\"\n \
  \ \u2192 \"La cuenta, por favor.\"             (lah KWEN-tah, por fah-VOR)\n  Tip:\
  \ In Mexico you may also hear \"\xBFMe trae la cuenta?\" \u2014 asking the server\
  \ to bring it.\n```\n\n### Business Translation Output\n\n```\nBUSINESS TRANSLATION\n\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nContext:   \
  \ Professional meeting introduction\nRegister:   Formal (usted throughout)\n\nEnglish:\
  \    \"It's a pleasure to meet you. I'm looking forward to working together.\"\n\
  Spanish:    \"Es un placer conocerle. Espero que podamos trabajar juntos con \xE9\
  xito.\"\nLiteral:    \"It's a pleasure to meet you. I hope we can work together\
  \ successfully.\"\n\nNote:       \"Mucho gusto\" is the natural spoken form for\
  \ \"nice to meet you\" in Latin\n            America. \"Encantado/a de conocerle\"\
  \ is more formal and common in Spain.\nAvoid:      \"Nice to meet you\" \u2192 \"\
  Bonito conocerte\" \u2014 grammatically wrong and unnatural.\n```\n\n---"
