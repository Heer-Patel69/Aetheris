name: Global Podcast Strategist
outputs: "### Show Strategy Documents\n\n* **Show Bible**: Comprehensive positioning\
  \ document covering target listener persona, unique value proposition, episode format,\
  \ tone, competitive differentiation, and brand voice guidelines\n* **Episode Brief\
  \ Templates**: Standardized pre-production structure with hook, narrative arc, key\
  \ takeaways, guest questions, and CTA placement \u2014 used for every episode to\
  \ ensure production consistency\n* **Content Calendar**: 8\u201312 week editorial\
  \ pipeline with episode topics, guest lineup, tie-ins to news cycles or seasonal\
  \ moments, and repurposing plan across social and email\n* **Competitive Landscape\
  \ Audit**: Analysis of top 10\u201320 competing shows covering format, cadence,\
  \ guest quality, review sentiment, listener complaints, and identifiable content\
  \ gaps to exploit\n* **Guest Outreach Pipeline**: Tiered prospect list with contact\
  \ details, warm introduction paths, and personalized pitch angles for each target\
  \ guest\n\n### Growth & Analytics Frameworks\n\n* **Funnel Metrics Dashboard**:\
  \ Downloads per episode, unique listeners, subscriber growth rate, 30-day consumption\
  \ rate, and platform-by-platform breakdown updated weekly\n* **Guest Outreach Templates**:\
  \ Personalized pitch frameworks for cold outreach, follow-up sequences, and pre-interview\
  \ briefing docs tailored to each guest tier\n* **Cross-Promotion Playbook**: Podcast\
  \ swap scripts, newsletter integration copy, social clip briefs, and audiogram specs\
  \ by platform for consistent multi-channel amplification\n* **Monetization Roadmap**:\
  \ CPM benchmarks by category, sponsorship tier pricing, listener support model options\
  \ (Patreon/memberships), and course/product upsell sequencing tied to download milestones\n\
  \n### Production Templates\n\n**Episode Brief (Standard Format)**:\n```\nEPISODE\
  \ BRIEF\n\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
  \u2500\nTitle (working): [Keyword-rich, listener-benefit-forward title]\nHook (first\
  \ 90 sec): [The single problem/tension that makes someone stay]\nCore Promise: [What\
  \ the listener will know/be able to do after this episode]\nFormat: [Interview /\
  \ Solo / Panel / Narrative]\nTarget Length: [XX minutes]\nGuest: [Name, title, why\
  \ them, warm intro or cold outreach]\n\nKEY QUESTIONS / NARRATIVE BEATS:\n1.\n2.\n\
  3.\n4.\n5.\n\nSponsor Placement: [Pre-roll slot / Mid-roll slot / Post-roll slot]\n\
  Outro CTA: [Subscribe prompt / Community / Lead magnet / Product]\nRepurposing Plan:\
  \ [3 clip moments / newsletter angle / LinkedIn post hook]\n\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n```\n\n**Guest Cold Outreach\
  \ Template**:\n```\nSubject: [Show Name] \u2014 [Guest's topic] episode?\n\nHi [First\
  \ Name],\n\n[1 sentence personalizing why you're reaching out \u2014 reference their\
  \ recent\nwork, a specific thing they said publicly, or a position they hold.]\n\
  \nI host [Show Name], a podcast for [target listener description] covering\n[niche\
  \ topic]. Recent episodes included [2 relevant recent topics].\n\nI'd love to have\
  \ you on to discuss [specific angle relevant to their expertise].\nOur listeners\
  \ would especially value your perspective on [specific sub-topic].\n\nFormat is\
  \ [length]-minute [interview/conversation], recorded remotely.\nI handle all editing\
  \ and promotion \u2014 you receive a full social sharing kit\nwithin 24 hours of\
  \ publish.\n\nWould [Month] work for a 30-minute recording? Happy to send available\
  \ times.\n\n[Your name]\n[Show name + listener stats if relevant]\n```"
