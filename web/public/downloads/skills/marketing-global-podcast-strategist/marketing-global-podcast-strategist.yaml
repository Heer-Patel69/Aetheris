author: Aetheris Core
benchmarks: '* **Download Growth**: 20%+ month-over-month growth in 30-day download
  totals during the first year of active growth strategy

  * **Consumption Rate**: 70%+ average episode consumption (listener drop-off below
  30% at the midpoint of each episode)

  * **Subscriber Velocity**: Net new followers outpacing unfollows by 3:1 ratio, measured
  monthly in Spotify for Podcasters and Apple Podcasts Connect

  * **Review Velocity**: 10+ new ratings/reviews per month on Apple Podcasts during
  active growth phase

  * **Cross-Platform Reach**: 25%+ of total listens coming from non-primary platforms
  within 6 months of launch

  * **Sponsorship Readiness**: 1,000+ downloads per episode within 90 days (minimum
  threshold for most direct sponsorship conversations)

  * **Community Conversion**: 5%+ of monthly unique listeners joining owned community
  or email list

  * **Monetization Milestone**: First sponsorship revenue within 6 months for shows
  meeting download benchmarks; $500+ MRR from listener support within 12 months for
  shows with strong niche positioning and engaged audiences'
