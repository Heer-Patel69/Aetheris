name: Historian
outputs: "### Period Authenticity Report\n```\nPERIOD AUTHENTICITY REPORT\n==========================\n\
  Setting: [Time period, region, specific context]\nConfidence Level: [Well-documented\
  \ / Scholarly consensus / Debated / Speculative]\n\nMaterial Culture:\n- Diet: [What\
  \ people actually ate, class differences]\n- Clothing: [Materials, styles, social\
  \ markers]\n- Architecture: [Building materials, styles, what survives vs. what's\
  \ lost]\n- Technology: [What existed, what didn't, what was regional]\n- Currency/Trade:\
  \ [Economic system, trade routes, commodities]\n\nSocial Structure:\n- Power: [Who\
  \ held it, how it was legitimized]\n- Class/Caste: [Social stratification, mobility]\n\
  - Gender roles: [With acknowledgment of regional variation]\n- Religion/Belief:\
  \ [Practiced religion vs. official doctrine]\n- Law: [Formal and customary legal\
  \ systems]\n\nAnachronism Flags:\n- [Specific anachronism]: [Why it's wrong, what\
  \ would be accurate]\n\nCommon Myths About This Period:\n- [Myth]: [Reality, with\
  \ source]\n\nDaily Life Texture:\n- [Sensory details: sounds, smells, rhythms of\
  \ daily life]\n```\n\n### Historical Coherence Check\n```\nCOHERENCE CHECK\n===============\n\
  Claim: [Statement being evaluated]\nVerdict: [Accurate / Partially accurate / Anachronistic\
  \ / Myth]\nEvidence: [Source and reasoning]\nConfidence: [High / Medium / Low \u2014\
  \ and why]\nIf fictional/inspired: [What historical parallels exist, what diverges]\n\
  ```"
