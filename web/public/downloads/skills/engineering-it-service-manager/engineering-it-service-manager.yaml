name: IT Service Manager
outputs: "### Service Catalog Framework\n\n```\nSERVICE CATALOG DESIGN TEMPLATE\n\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nSERVICE RECORD\n \
  \ Service Name:         [User-friendly name \u2014 not IT jargon]\n  Service Description:\
  \  [What it does and who it's for \u2014 plain language]\n  Service Owner:     \
  \   [IT role responsible for this service]\n  Service Category:     [Infrastructure\
  \ / Application / End User / Business]\n\nSERVICE DETAILS\n  Business Value:   \
  \    [Why this service matters to the business]\n  Target Users:         [Who can\
  \ request/use this service]\n  Hours of Operation:   [24/7 / Business hours / Defined\
  \ schedule]\n  Support Hours:        [When support is available]\n  Dependencies:\
  \         [Other services this depends on]\n\nSERVICE LEVELS\n  Availability target:\
  \  [e.g., 99.9% uptime]\n  Recovery Time Obj:    RTO: [Hours to restore after outage]\n\
  \  Recovery Point Obj:   RPO: [Maximum acceptable data loss]\n  Response time: \
  \       [How fast IT responds to issues]\n  Resolution time:      [How fast IT resolves\
  \ issues]\n\nREQUEST FULFILLMENT\n  How to request:       [Portal URL / email /\
  \ phone]\n  Fulfillment time:     [Standard: X hours / Expedited: Y hours]\n  Approvals\
  \ required:   [Manager / Security / Finance / None]\n  Cost to business:     [Chargeback\
  \ amount if applicable]\n  Inputs required:      [What the user must provide to\
  \ request]\n\nMAINTENANCE\n  Last reviewed:        [Date]\n  Next review:      \
  \    [Date \u2014 no service should go unreviewed > 12 months]\n  Review owner:\
  \         [Name]\n```\n\n### Incident Management Framework\n\n```\nINCIDENT MANAGEMENT\
  \ PROTOCOL\n\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n\
  INCIDENT PRIORITY MATRIX:\n              \u2502 High Impact  \u2502 Medium Impact\
  \ \u2502 Low Impact\n  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
  \u2500\u2500\u253C\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\u253C\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u253C\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\n  High Urgency\u2502 P1 \u2014 CRIT   \u2502 P2 \u2014 HIGH\
  \     \u2502 P3 \u2014 MED\n  Med Urgency \u2502 P2 \u2014 HIGH   \u2502 P3 \u2014\
  \ MED      \u2502 P4 \u2014 LOW\n  Low Urgency \u2502 P3 \u2014 MED    \u2502 P4\
  \ \u2014 LOW      \u2502 P4 \u2014 LOW\n\nPRIORITY DEFINITIONS:\n  P1 \u2014 Critical:\n\
  \    - Complete service outage affecting all users\n    - Core business process\
  \ stopped (revenue, safety, compliance)\n    - Response: 15 min | Resolution target:\
  \ 4 hours\n    - Escalation: Incident Commander + VP IT within 15 min\n    - Status\
  \ updates: Every 30 minutes\n\n  P2 \u2014 High:\n    - Major service degradation\
  \ (significant user impact)\n    - Single department or key system affected\n  \
  \  - Response: 30 min | Resolution target: 8 hours\n    - Escalation: IT Manager\
  \ within 30 min\n    - Status updates: Every 60 minutes\n\n  P3 \u2014 Medium:\n\
  \    - Service impairment (workaround available)\n    - Single user or small group\
  \ affected\n    - Response: 2 hours | Resolution target: 24 hours\n    - Status\
  \ updates: At significant milestones\n\n  P4 \u2014 Low:\n    - Minor issue with\
  \ minimal business impact\n    - Workaround readily available\n    - Response: 8\
  \ hours | Resolution target: 72 hours\n\nINCIDENT RECORD FIELDS (required):\n  \u25A1\
  \ Incident ID (auto-generated)\n  \u25A1 Reporter name and contact\n  \u25A1 Date/time\
  \ reported\n  \u25A1 Priority (P1-P4)\n  \u25A1 Affected service and CI\n  \u25A1\
  \ Impact and urgency assessment\n  \u25A1 Description of the incident\n  \u25A1\
  \ Assignee and team\n  \u25A1 Status (Open / In Progress / Pending / Resolved /\
  \ Closed)\n  \u25A1 Resolution description\n  \u25A1 Root cause (if identified)\n\
  \  \u25A1 Time to respond / Time to resolve\n  \u25A1 Linked problem record (if\
  \ applicable)\n\nMAJOR INCIDENT COMMUNICATION TEMPLATE:\n  Subject: [P1/P2] [Service]\
  \ Outage \u2014 Update [#N] \u2014 [Time]\n\n  STATUS: [Investigating / Identified\
  \ / Implementing Fix / Resolved]\n\n  WHAT IS AFFECTED:\n  [Specific service(s)\
  \ and user population affected]\n\n  CURRENT SITUATION:\n  [What we know right now\
  \ \u2014 factual, not speculative]\n\n  ACTIONS BEING TAKEN:\n  [What the team is\
  \ actively doing to resolve]\n\n  ESTIMATED RESOLUTION:\n  [Best current estimate\
  \ \u2014 or \"unknown, next update in 30 min\"]\n\n  NEXT UPDATE:\n  [Specific time\
  \ of next communication]\n\n  INCIDENT COMMANDER: [Name and contact]\n```\n\n###\
  \ Problem Management Framework\n\n```\nPROBLEM MANAGEMENT PROTOCOL\n\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nPROBLEM TRIGGERS:\n  \u25A1\
  \ Major incident (P1) \u2014 always triggers problem record\n  \u25A1 Recurring\
  \ incident pattern (same service, same symptoms, 3+ times in 30 days)\n  \u25A1\
  \ Proactive discovery (monitoring, trend analysis, audit)\n  \u25A1 External intelligence\
  \ (vendor advisory, security bulletin)\n\nPROBLEM RECORD FIELDS:\n  \u25A1 Problem\
  \ ID\n  \u25A1 Linked incident records\n  \u25A1 Affected service and CIs\n  \u25A1\
  \ Problem statement (symptom description)\n  \u25A1 Priority and business impact\n\
  \  \u25A1 Problem owner and team\n  \u25A1 Root cause analysis method used\n  \u25A1\
  \ Root cause (when identified)\n  \u25A1 Workaround (interim fix \u2014 documented\
  \ in known error database)\n  \u25A1 Permanent fix (proposed and implemented)\n\
  \  \u25A1 Status (Open / Known Error / Fix In Progress / Resolved / Closed)\n\n\
  ROOT CAUSE ANALYSIS TOOLS:\n  5 Whys:\n    Symptom: [What happened]\n    Why 1:\
  \ [First level cause]\n    Why 2: [Cause of Why 1]\n    Why 3: [Cause of Why 2]\n\
  \    Why 4: [Cause of Why 3]\n    Why 5 (Root): [Fundamental cause]\n    Fix: [What\
  \ would prevent this at the root level]\n\n  Fishbone (Ishikawa):\n    Effect: [The\
  \ problem]\n    Causes by category:\n      People:    [Human factors]\n      Process:\
  \   [Process failures]\n      Technology:[System/tool failures]\n      Environment:[Infrastructure/environmental]\n\
  \      Data:      [Data quality/availability]\n      External:  [Third-party or\
  \ external factors]\n\nKNOWN ERROR DATABASE (KEDB):\n  Known Error ID:   [KE-XXXXX]\n\
  \  Related Problem:  [Problem record ID]\n  Description:      [What the error is]\n\
  \  Affected CIs:     [Configuration items affected]\n  Workaround:       [Step-by-step\
  \ interim fix]\n  Permanent Fix:    [Planned resolution and timeline]\n  Status:\
  \           [Open / Fix Pending / Fixed]\n```\n\n### Change Management Framework\n\
  \n```\nCHANGE MANAGEMENT PROTOCOL\n\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\nCHANGE TYPES:\n  Standard Change:\n    - Pre-approved, low risk,\
  \ well-understood, frequently performed\n    - Examples: password reset, standard\
  \ software install, routine patch\n    - Process: No CAB required \u2014 follow\
  \ documented procedure\n    - Examples in catalog: [List your organization's standard\
  \ changes]\n\n  Normal Change (Minor):\n    - Moderate risk, requires review and\
  \ approval\n    - Examples: application configuration change, network rule addition\n\
  \    - Process: Submit RFC \u2192 Technical peer review \u2192 Manager approval\n\
  \    - Lead time: \u2265 3 business days\n\n  Normal Change (Major):\n    - Higher\
  \ risk, broader impact, requires CAB review\n    - Examples: infrastructure upgrade,\
  \ core system change, DR test\n    - Process: Submit RFC \u2192 Technical review\
  \ \u2192 CAB review \u2192 CAB approval\n    - Lead time: \u2265 5 business days\n\
  \n  Emergency Change:\n    - Unplanned, required to restore service or prevent imminent\
  \ risk\n    - Examples: emergency security patch, critical bug fix in production\n\
  \    - Process: ECAB approval (subset of CAB, available 24/7) \u2192 Implement \u2192\
  \ Full CAB retrospective\n    - Requirement: Emergency changes must be logged retroactively\
  \ if implemented before approval\n\nCHANGE REQUEST (RFC) FIELDS:\n  \u25A1 Change\
  \ ID (auto-generated)\n  \u25A1 Change title and description\n  \u25A1 Business\
  \ justification\n  \u25A1 Technical description (what exactly will change)\n  \u25A1\
  \ Services and CIs affected\n  \u25A1 Risk assessment (Low / Medium / High / Very\
  \ High)\n  \u25A1 Implementation plan (step-by-step)\n  \u25A1 Backout plan (how\
  \ to reverse if something goes wrong)\n  \u25A1 Test plan (how you'll verify success)\n\
  \  \u25A1 Maintenance window (date, time, duration)\n  \u25A1 Resources required\
  \ (people, tools, access)\n  \u25A1 Approvals (technical lead, manager, CAB if required)\n\
  \nCAB MEETING STRUCTURE:\n  Frequency: Weekly (or as required for emergency changes)\n\
  \  Attendees: Change Manager, IT leads by domain, Business rep (for major changes)\n\
  \n  Agenda:\n  1. Review previous changes \u2014 outcomes and any issues (10 min)\n\
  \  2. Emergency changes since last CAB \u2014 retrospective (10 min)\n  3. Review\
  \ upcoming standard changes \u2014 awareness (5 min)\n  4. Review and approve/reject/defer\
  \ normal changes (20 min)\n  5. Review and approve/reject/defer major changes (15\
  \ min)\n  6. Open items (5 min)\n\nCHANGE RISK ASSESSMENT:\n  Impact (1-5):    1=Single\
  \ user / 3=Department / 5=All users\n  Probability (1-5): 1=Unlikely to fail / 5=High\
  \ failure risk\n  Risk score = Impact \xD7 Probability\n  1-8: Low | 9-15: Medium\
  \ | 16-20: High | 21-25: Very High\n\nPOST-IMPLEMENTATION REVIEW (PIR):\n  \u25A1\
  \ Was the change implemented as planned?\n  \u25A1 Was the maintenance window adhered\
  \ to?\n  \u25A1 Were there any unplanned outages or incidents?\n  \u25A1 Was the\
  \ backout plan required? If so, what happened?\n  \u25A1 What lessons were learned?\n\
  \  \u25A1 Should this become a standard change?\n```\n\n### SLA Governance Framework\n\
  \n```\nSLA MANAGEMENT FRAMEWORK\n\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\nSLA COMPONENTS:\n  Service:          [Which service this SLA\
  \ covers]\n  Customer:         [Who the SLA is with \u2014 business unit or organization]\n\
  \  Period:           [Monthly / Quarterly / Annual measurement]\n\n  Availability:\
  \     [Target % uptime \u2014 e.g., 99.5%]\n                    Calculation: (Agreed\
  \ hours - Downtime) \xF7 Agreed hours \xD7 100\n\n  Response time:    [Time from\
  \ ticket submission to first IT response]\n                    By priority: P1:\
  \ 15min | P2: 30min | P3: 2hr | P4: 8hr\n\n  Resolution time:  [Time from ticket\
  \ submission to resolution]\n                    By priority: P1: 4hr | P2: 8hr\
  \ | P3: 24hr | P4: 72hr\n\n  Exclusions:       [What doesn't count against SLA]\n\
  \                    - Scheduled maintenance windows\n                    - Customer-caused\
  \ outages\n                    - Force majeure events\n\nSLA REPORTING (monthly):\n\
  \  Service: [Name]\n  Period: [Month/Year]\n\n  Availability:\n    Target: [%] |\
  \ Actual: [%] | Status: Met / Breached\n    Downtime incidents: [List with duration]\n\
  \n  Incident Response (by priority):\n    P1: Target [min] | Actual avg [min] |\
  \ Compliance [%]\n    P2: Target [min] | Actual avg [min] | Compliance [%]\n   \
  \ P3: Target [hr] | Actual avg [hr] | Compliance [%]\n    P4: Target [hr] | Actual\
  \ avg [hr] | Compliance [%]\n\n  SLA Breaches This Period: [# and details]\n  Root\
  \ cause of breaches: [Summary]\n  Remediation actions: [What is being done to prevent\
  \ recurrence]\n\n  Customer Satisfaction: [CSAT score if measured]\n  Trend: [Improving\
  \ / Stable / Declining vs. prior 3 months]\n\nSLA BREACH PROTOCOL:\n  1. Identify\
  \ breach immediately \u2014 don't wait for end-of-month report\n  2. Notify service\
  \ owner and IT manager within 24 hours\n  3. Document root cause\n  4. Communicate\
  \ to affected business stakeholders\n  5. Define and implement remediation action\n\
  \  6. Include in monthly SLA report with full transparency\n```\n\n### CMDB Governance\
  \ Framework\n\n```\nCONFIGURATION MANAGEMENT DATABASE (CMDB)\n\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nCI TYPES AND REQUIRED ATTRIBUTES:\n\
  \  Hardware (servers, workstations, network devices):\n    \u25A1 CI Name | \u25A1\
  \ Manufacturer | \u25A1 Model | \u25A1 Serial Number\n    \u25A1 Location | \u25A1\
  \ Owner | \u25A1 Supported By | \u25A1 Status\n    \u25A1 Purchase Date | \u25A1\
  \ Warranty Expiry | \u25A1 OS/Firmware Version\n\n  Software (applications, licenses):\n\
  \    \u25A1 Application Name | \u25A1 Version | \u25A1 Vendor | \u25A1 License Type\n\
  \    \u25A1 License Count | \u25A1 Expiry Date | \u25A1 Installed On (linked CIs)\n\
  \    \u25A1 Owner | \u25A1 Support Contact | \u25A1 Criticality\n\n  Services (IT\
  \ services in catalog):\n    \u25A1 Service Name | \u25A1 Service Owner | \u25A1\
  \ SLA | \u25A1 Status\n    \u25A1 Dependent CIs | \u25A1 Supporting Services | \u25A1\
  \ Upstream Dependencies\n\n  Network (circuits, firewalls, switches, VPNs):\n  \
  \  \u25A1 Device Name | \u25A1 IP Address | \u25A1 Location | \u25A1 Owner\n   \
  \ \u25A1 Connected To (relationships) | \u25A1 Bandwidth | \u25A1 Carrier\n\nCMDB\
  \ ACCURACY MAINTENANCE:\n  Discovery tools (automated \u2014 primary source):\n\
  \    \u25A1 Network discovery scan: Weekly\n    \u25A1 Endpoint agent data: Continuous\n\
  \    \u25A1 Cloud asset inventory: Daily sync\n\n  Manual audit (validation):\n\
  \    \u25A1 Physical hardware audit: Annually\n    \u25A1 Software license audit:\
  \ Annually\n    \u25A1 Critical service CI review: Quarterly\n    \u25A1 Relationship\
  \ mapping review: Semi-annually\n\n  Change-driven updates:\n    \u25A1 Every approved\
  \ change must update affected CIs upon completion\n    \u25A1 CI status must reflect\
  \ actual state (In Use / Retired / In Storage)\n    \u25A1 Decommissioned CIs must\
  \ be retired in CMDB within 30 days\n\nCMDB HEALTH METRICS:\n  Coverage: % of known\
  \ assets with a CMDB record \u2014 target \u2265 95%\n  Accuracy: % of CI attributes\
  \ verified as current \u2014 target \u2265 90%\n  Relationship completeness: % of\
  \ CIs with mapped relationships \u2014 target \u2265 80%\n```\n\n### CSI (Continual\
  \ Service Improvement) Register\n\n```\nCSI REGISTER TEMPLATE\n\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nInitiative ID:      [CSI-XXXXX]\n\
  Initiative Title:   [Clear, action-oriented name]\nDescription:        [What improvement\
  \ is being made and why]\nService Affected:   [Which service(s) will benefit]\n\
  Business Value:     [Why this matters to the business \u2014 quantified if possible]\n\
  \nBASELINE METRIC:\n  Current state:    [Measured value before improvement]\n  Measurement\
  \ date: [When baseline was taken]\n  Source:           [How it was measured]\n\n\
  TARGET METRIC:\n  Target state:     [Desired value after improvement]\n  Target\
  \ date:      [When we expect to achieve the target]\n  Success criteria: [How we'll\
  \ know the improvement succeeded]\n\nIMPLEMENTATION:\n  Owner:            [Person\
  \ accountable for delivery]\n  Team:             [Who is doing the work]\n  Approach:\
  \         [What will be done]\n  Timeline:         [Key milestones]\n  Resources:\
  \        [Budget, tools, people required]\n\nSTATUS TRACKING:\n  Current status:\
  \   [Not Started / In Progress / Complete / On Hold]\n  Last updated:     [Date]\n\
  \  Notes:            [Current progress, blockers, adjustments]\n\nRESULTS (completed\
  \ initiatives):\n  Actual outcome:   [What was achieved]\n  Benefit realized: [Quantified\
  \ \u2014 cost saved, time saved, incidents reduced]\n  Lessons learned:  [What to\
  \ do differently next time]\n```\n\n---"
