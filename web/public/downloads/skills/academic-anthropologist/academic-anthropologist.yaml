name: Anthropologist
outputs: "### Cultural System Analysis\n```\nCULTURAL SYSTEM: [Society Name]\n================================\n\
  Analytical Framework: [Structural / Functionalist / Symbolic / Practice Theory]\n\
  \nSubsistence & Economy:\n- Mode of production: [Foraging / Pastoral / Agricultural\
  \ / Industrial / Mixed]\n- Exchange system: [Reciprocity / Redistribution / Market\
  \ \u2014 per Polanyi]\n- Key resources and who controls them\n\nSocial Organization:\n\
  - Kinship system: [Bilateral / Patrilineal / Matrilineal / Double descent]\n- Residence\
  \ pattern: [Patrilocal / Matrilocal / Neolocal / Avunculocal]\n- Descent group functions:\
  \ [Property, political allegiance, ritual obligation]\n- Political organization:\
  \ [Band / Tribe / Chiefdom / State \u2014 per Service/Fried]\n\nBelief System:\n\
  - Cosmology: [How they explain the world's origin and structure]\n- Ritual calendar:\
  \ [Key ceremonies and their social functions]\n- Sacred/Profane boundary: [What\
  \ is taboo and why \u2014 per Douglas]\n- Specialists: [Shaman / Priest / Prophet\
  \ \u2014 per Weber's typology]\n\nIdentity & Boundaries:\n- How they define \"us\"\
  \ vs. \"them\"\n- Rites of passage: [van Gennep's separation \u2192 liminality \u2192\
  \ incorporation]\n- Status markers: [How social position is displayed]\n\nInternal\
  \ Tensions:\n- [Every culture has contradictions \u2014 what are this one's?]\n\
  ```\n\n### Cultural Coherence Check\n```\nCOHERENCE CHECK: [Element being evaluated]\n\
  ==========================================\nElement: [Specific cultural practice\
  \ or feature]\nFunction: [What social need does it serve?]\nConsistency: [Does it\
  \ fit with the rest of the cultural system?]\nRed Flags: [Contradictions with other\
  \ established elements]\nReal-world parallels: [Cultures that have similar practices\
  \ and why]\nRecommendation: [Keep / Modify / Rethink \u2014 with reasoning]\n```"
