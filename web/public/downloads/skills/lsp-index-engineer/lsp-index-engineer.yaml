outputs: "### graphd Core Architecture\n```typescript\n// Example graphd server structure\n\
  interface GraphDaemon {\n  // LSP Client Management\n  lspClients: Map<string, LanguageClient>;\n\
  \  \n  // Graph State\n  graph: {\n    nodes: Map<NodeId, GraphNode>;\n    edges:\
  \ Map<EdgeId, GraphEdge>;\n    index: SymbolIndex;\n  };\n  \n  // API Endpoints\n\
  \  httpServer: {\n    '/graph': () => GraphResponse;\n    '/nav/:symId': (symId:\
  \ string) => NavigationResponse;\n    '/stats': () => SystemStats;\n  };\n  \n \
  \ // WebSocket Events\n  wsServer: {\n    onConnection: (client: WSClient) => void;\n\
  \    emitDiff: (diff: GraphDiff) => void;\n  };\n  \n  // File Watching\n  watcher:\
  \ {\n    onFileChange: (path: string) => void;\n    onGitCommit: (hash: string)\
  \ => void;\n  };\n}\n\n// Graph Schema Types\ninterface GraphNode {\n  id: string;\
  \        // \"file:src/foo.ts\" or \"sym:foo#method\"\n  kind: 'file' | 'module'\
  \ | 'class' | 'function' | 'variable' | 'type';\n  file?: string;     // Parent\
  \ file path\n  range?: Range;     // LSP Range for symbol location\n  detail?: string;\
  \   // Type signature or brief description\n}\n\ninterface GraphEdge {\n  id: string;\
  \        // \"edge:uuid\"\n  source: string;    // Node ID\n  target: string;  \
  \  // Node ID\n  type: 'contains' | 'imports' | 'extends' | 'implements' | 'calls'\
  \ | 'references';\n  weight?: number;   // For importance/frequency\n}\n```\n\n\
  ### LSP Client Orchestration\n```typescript\n// Multi-language LSP orchestration\n\
  class LSPOrchestrator {\n  private clients = new Map<string, LanguageClient>();\n\
  \  private capabilities = new Map<string, ServerCapabilities>();\n  \n  async initialize(projectRoot:\
  \ string) {\n    // TypeScript LSP\n    const tsClient = new LanguageClient('typescript',\
  \ {\n      command: 'typescript-language-server',\n      args: ['--stdio'],\n  \
  \    rootPath: projectRoot\n    });\n    \n    // PHP LSP (Intelephense or similar)\n\
  \    const phpClient = new LanguageClient('php', {\n      command: 'intelephense',\n\
  \      args: ['--stdio'],\n      rootPath: projectRoot\n    });\n    \n    // Initialize\
  \ all clients in parallel\n    await Promise.all([\n      this.initializeClient('typescript',\
  \ tsClient),\n      this.initializeClient('php', phpClient)\n    ]);\n  }\n  \n\
  \  async getDefinition(uri: string, position: Position): Promise<Location[]> {\n\
  \    const lang = this.detectLanguage(uri);\n    const client = this.clients.get(lang);\n\
  \    \n    if (!client || !this.capabilities.get(lang)?.definitionProvider) {\n\
  \      return [];\n    }\n    \n    return client.sendRequest('textDocument/definition',\
  \ {\n      textDocument: { uri },\n      position\n    });\n  }\n}\n```\n\n### Graph\
  \ Construction Pipeline\n```typescript\n// ETL pipeline from LSP to graph\nclass\
  \ GraphBuilder {\n  async buildFromProject(root: string): Promise<Graph> {\n   \
  \ const graph = new Graph();\n    \n    // Phase 1: Collect all files\n    const\
  \ files = await glob('**/*.{ts,tsx,js,jsx,php}', { cwd: root });\n    \n    // Phase\
  \ 2: Create file nodes\n    for (const file of files) {\n      graph.addNode({\n\
  \        id: `file:${file}`,\n        kind: 'file',\n        path: file\n      });\n\
  \    }\n    \n    // Phase 3: Extract symbols via LSP\n    const symbolPromises\
  \ = files.map(file => \n      this.extractSymbols(file).then(symbols => {\n    \
  \    for (const sym of symbols) {\n          graph.addNode({\n            id: `sym:${sym.name}`,\n\
  \            kind: sym.kind,\n            file: file,\n            range: sym.range\n\
  \          });\n          \n          // Add contains edge\n          graph.addEdge({\n\
  \            source: `file:${file}`,\n            target: `sym:${sym.name}`,\n \
  \           type: 'contains'\n          });\n        }\n      })\n    );\n    \n\
  \    await Promise.all(symbolPromises);\n    \n    // Phase 4: Resolve references\
  \ and calls\n    await this.resolveReferences(graph);\n    \n    return graph;\n\
  \  }\n}\n```\n\n### Navigation Index Format\n```jsonl\n{\"symId\":\"sym:AppController\"\
  ,\"def\":{\"uri\":\"file:///src/controllers/app.php\",\"l\":10,\"c\":6}}\n{\"symId\"\
  :\"sym:AppController\",\"refs\":[\n  {\"uri\":\"file:///src/routes.php\",\"l\":5,\"\
  c\":10},\n  {\"uri\":\"file:///tests/app.test.php\",\"l\":15,\"c\":20}\n]}\n{\"\
  symId\":\"sym:AppController\",\"hover\":{\"contents\":{\"kind\":\"markdown\",\"\
  value\":\"```php\\nclass AppController extends BaseController\\n```\\nMain application\
  \ controller\"}}}\n{\"symId\":\"sym:useState\",\"def\":{\"uri\":\"file:///node_modules/react/index.d.ts\"\
  ,\"l\":1234,\"c\":17}}\n{\"symId\":\"sym:useState\",\"refs\":[\n  {\"uri\":\"file:///src/App.tsx\"\
  ,\"l\":3,\"c\":10},\n  {\"uri\":\"file:///src/components/Header.tsx\",\"l\":2,\"\
  c\":10}\n]}\n```"
