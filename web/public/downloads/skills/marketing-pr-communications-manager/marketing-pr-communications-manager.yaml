name: PR & Communications Manager
outputs: "### Press Release Framework\n\n```\nPRESS RELEASE STRUCTURE\n\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nFOR IMMEDIATE RELEASE  \
  \                        [or: EMBARGOED UNTIL: Date/Time ET]\n\n[HEADLINE \u2014\
  \ active voice, newsworth angle, under 10 words]\n[SUBHEADLINE \u2014 one sentence\
  \ that adds context or a key data point]\n\n[CITY, Date] \u2014 [Lead paragraph:\
  \ the news, why it matters, who it affects \u2014\nanswer who, what, when, where,\
  \ why in the first 50 words]\n\n[Body paragraph 1: Context and significance \u2014\
  \ why now, why this matters\nto the industry or audience]\n\n[Body paragraph 2:\
  \ Executive quote \u2014 attributed to CEO or relevant leader.\nShould add perspective,\
  \ not just repeat the lead. Human voice, not corporate speak.]\n\n[Body paragraph\
  \ 3: Supporting detail \u2014 product specifics, partnership terms,\nmarket context,\
  \ data points]\n\n[Body paragraph 4: Secondary quote \u2014 partner, customer, or\
  \ analyst if available]\n\n[Body paragraph 5: Forward-looking statement or availability/next\
  \ steps]\n\nAbout [Company]:\n[2-3 sentence boilerplate \u2014 who you are, what\
  \ you do, notable stats or recognition]\n\nMedia Contact:\n[Name] | [Title]\n[Email]\
  \ | [Phone]\n[Website]\n\n###\n\nHeadline principles:\n\u2705 Active voice: \"Company\
  \ Launches X\" not \"X is Launched by Company\"\n\u2705 Lead with the news value,\
  \ not the company name\n\u2705 Avoid jargon \u2014 write for a general business\
  \ reader\n\u2705 Numbers and specifics beat vague claims (\"raises $40M\" beats\
  \ \"raises significant funding\")\n\u274C Never use superlatives (\"world's first,\"\
  \ \"revolutionary\") without proof\n\u274C Never bury the news below the fold\n\
  ```\n\n### Media Pitch Framework\n\n```\nMEDIA PITCH STRUCTURE\n\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nSubject line:\n  - Under 8 words\n\
  \  - Lead with the story angle, not the company name\n  - Specific, not generic\n\
  \  Examples:\n    \"Why enterprise AI deployments keep failing \u2014 one company's\
  \ fix\"\n    \"New data: remote workers are more productive (but lonelier)\"\n \
  \   \"Exclusive: [Company] raises $X to solve [specific problem]\"\n\nPitch body\
  \ (under 200 words):\n\nPara 1 \u2014 THE HOOK (why this journalist, why now)\n\
  \  \"I've been following your coverage of [topic] \u2014 particularly your\n  piece\
  \ on [specific article]. I have a story angle I think fits\n  your beat.\"\n\nPara\
  \ 2 \u2014 THE STORY (the news or idea, not the company)\n  Lead with the trend,\
  \ the data, the insight, or the conflict.\n  The company is supporting evidence\
  \ \u2014 not the story itself.\n\nPara 3 \u2014 THE OFFER (what you're giving them)\n\
  \  - Exclusive vs. embargo vs. open\n  - Access to CEO/spokesperson\n  - Data, research,\
  \ or case study available\n  - Customer reference available for interview\n\nPara\
  \ 4 \u2014 THE ASK (one specific, low-friction ask)\n  \"Would a 15-minute briefing\
  \ this week work? Happy to\n  share the full research deck in advance.\"\n\nSign-off:\n\
  \  [Name] | [Title] | [Company]\n  [Phone] \u2014 available for quick calls\n\n\
  Pitch rules:\n\u2705 One story angle per pitch \u2014 never pitch multiple ideas\
  \ at once\n\u2705 Personalize the first paragraph every time \u2014 no templates\
  \ visible\n\u2705 Follow up once, 3-5 business days later \u2014 then move on\n\u274C\
  \ Never attach a press release to a first pitch\n\u274C Never CC multiple journalists\
  \ on the same email\n\u274C Never pitch on Mondays or Fridays\n```\n\n### Crisis\
  \ Communications Framework\n\n```\nCRISIS RESPONSE PROTOCOL\n\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\nFIRST 30 MINUTES \u2014 ASSESS & HOLD\n\
  \  1. Gather facts: What happened? What do we know vs. not know?\n  2. Assess severity:\
  \ Local / industry / national / viral?\n  3. Identify affected stakeholders: Customers?\
  \ Employees? Partners? Public?\n  4. Issue holding statement immediately (see template\
  \ below)\n  5. Convene crisis team: CEO, Legal, Communications, relevant ops leads\n\
  \  6. Establish single spokesperson \u2014 no one else speaks to press\n\nHOLDING\
  \ STATEMENT TEMPLATE:\n  \"We are aware of [situation] and are taking it seriously.\
  \ Our team\n  is actively investigating and working to [resolve/understand] the\n\
  \  situation. We will share a full update by [specific time]. The\n  safety and\
  \ [trust/wellbeing] of [customers/employees/partners] is\n  our top priority.\"\n\
  \n  Rules for holding statements:\n  \u2705 Acknowledge the situation \u2014 never\
  \ deny what's visible\n  \u2705 Show you're taking action\n  \u2705 Give a specific\
  \ time for next update \u2014 and honor it\n  \u274C Never speculate on cause or\
  \ assign blame before facts are confirmed\n  \u274C Never use \"no comment\"\n \
  \ \u274C Never minimize: \"this is a minor issue\" always backfires\n\nFIRST 2 HOURS\
  \ \u2014 RESPOND & CONTROL\n  1. Draft full response statement with Legal review\n\
  \  2. Identify and brief all internal stakeholders before going external\n  3. Prepare\
  \ FAQ document for customer-facing teams\n  4. Monitor media and social mentions\
  \ in real time\n  5. Identify journalists likely to cover \u2014 brief proactively\
  \ if possible\n\nONGOING \u2014 MANAGE & RECOVER\n  1. Update media and stakeholders\
  \ on a committed cadence\n  2. Document every media inquiry and response\n  3. Track\
  \ sentiment shift over time\n  4. Identify recovery narrative: what's the \"after\"\
  \ story?\n  5. Conduct post-crisis review: what triggered it, what worked, what\
  \ didn't\n\nCRISIS SEVERITY LEVELS:\n  Level 1 \u2014 Isolated: affects one customer/region,\
  \ contained, low media risk\n  Level 2 \u2014 Operational: service disruption, data\
  \ issue, employee matter\n  Level 3 \u2014 Reputational: media coverage likely,\
  \ executive visibility required\n  Level 4 \u2014 Existential: product safety, legal\
  \ action, viral social, regulatory\n\nNEVER DO IN A CRISIS:\n  \u274C Go dark \u2014\
  \ silence amplifies the story\n  \u274C Attack the journalist or publication\n \
  \ \u274C Lie or speculate \u2014 the truth always comes out\n  \u274C Have multiple\
  \ spokespersons saying different things\n  \u274C Delete social posts \u2014 screenshots\
  \ are permanent\n```\n\n### Executive Thought Leadership Framework\n\n```\nEXECUTIVE\
  \ POSITIONING SYSTEM\n\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
  \u2500\nStep 1 \u2014 DEFINE THE PLATFORM\n  What is this executive an authority\
  \ on?\n  - Intersection of personal expertise + company relevance + market need\n\
  \  - 1-2 specific topics max \u2014 broad = forgettable\n  - Example: \"The future\
  \ of AI in regulated industries\" not \"AI and business\"\n\nStep 2 \u2014 BUILD\
  \ THE CONTENT PILLAR\n  Owned content (LinkedIn, company blog):\n    - 2-3x per\
  \ week minimum for LinkedIn \u2014 mix of formats\n    - Long-form pieces: 1x per\
  \ month minimum\n    - Content types: POV essays, data insights, industry takes,\
  \ personal stories\n\n  Earned content (media bylines, interviews):\n    - Target\
  \ 2-3 bylines per quarter in tier-2+ publications\n    - Proactively pitch 1-2 media\
  \ opportunities per month\n    - Build journalist relationships before you need\
  \ them\n\n  Speaking (conferences, podcasts, panels):\n    - Submit to 5-10 CFPs\
  \ per quarter\n    - Prioritize industry-specific events over general business events\n\
  \    - Podcast circuit: 2-4 appearances per quarter\n\nStep 3 \u2014 MEDIA TRAIN\
  \ THE EXECUTIVE\n  Core messages: 3 maximum \u2014 know them cold\n  Bridging technique:\
  \ \"That's a good question \u2014 what I'd also add is...\"\n  Flagging technique:\
  \ \"I want to make sure I'm clear on this...\"\n  On camera: eye contact, pace,\
  \ avoid filler words, no jargon\n\nStep 4 \u2014 MEASURE POSITIONING PROGRESS\n\
  \  - Share of voice vs. competitors in target publications\n  - LinkedIn follower\
  \ growth and engagement rate\n  - Speaking invitations received (not just applied\
  \ for)\n  - Journalist inbound requests (the gold standard)\n  - Executive mention\
  \ rate in industry coverage\n```\n\n### Internal Communications Framework\n\n```\n\
  INTERNAL COMMUNICATIONS HIERARCHY\n\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\nRule: Employees always hear major news BEFORE external audiences.\n\
  \      No exceptions. A 30-minute head start minimum. 24 hours preferred.\n\nALL-HANDS\
  \ / TOWN HALL STRUCTURE:\n  Opening (5 min): State of the company \u2014 honest,\
  \ direct, no fluff\n  Updates (20 min): Key priorities, wins, challenges \u2014\
  \ with data\n  Deep dive (15 min): One topic in depth \u2014 strategy, product,\
  \ market\n  Q&A (20 min): Real questions, real answers \u2014 no planted softballs\n\
  \  Close (5 min): Reiterate priorities, express confidence, thank the team\n\nMAJOR\
  \ ANNOUNCEMENT EMAIL (to employees):\n  Subject: [Direct statement of the news \u2014\
  \ no teasing]\n\n  [First name],\n\n  [Lead with the news directly \u2014 no preamble]\n\
  \n  [Why this decision was made \u2014 honest reasoning]\n\n  [What this means for\
  \ employees specifically]\n\n  [What happens next and when]\n\n  [What you can do\
  \ if you have questions]\n\n  [CEO/leader name]\n\n  P.S. [Optional: Personal, human\
  \ note that shows you understand\n       this affects real people]\n\nCHANGE COMMUNICATIONS\
  \ FRAMEWORK:\n  1. Why are we changing? (The honest business reason)\n  2. What\
  \ exactly is changing? (Specific, not vague)\n  3. What is NOT changing? (Anchors\
  \ people to stability)\n  4. What does this mean for me? (The question everyone\
  \ actually has)\n  5. What happens next and when? (Timeline and next steps)\n  6.\
  \ Where do I go with questions? (Specific channel and contact)\n```\n\n### Awards\
  \ & Recognition Strategy\n\n```\nAWARDS PROGRAM FRAMEWORK\n\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\nAward identification criteria:\n  -\
  \ Tier: industry-specific > regional business > general business\n  - Credibility:\
  \ judged by peers/experts > editorial team > popular vote\n  - Audience: does the\
  \ target customer or recruit read this publication?\n  - ROI: does a win generate\
  \ media coverage, recruitment uplift, or sales value?\n\nAward submission structure:\n\
  \  Section 1 \u2014 EXECUTIVE SUMMARY\n    The nomination in 3 sentences: who, what\
  \ achievement, why it matters\n\n  Section 2 \u2014 THE CHALLENGE\n    What problem\
  \ existed? What was at stake? Why was it hard?\n\n  Section 3 \u2014 THE SOLUTION\n\
  \    What was done, how, and by whom? What made the approach distinctive?\n\n  Section\
  \ 4 \u2014 THE RESULTS\n    Quantified outcomes: revenue, growth rate, time saved,\
  \ customers served\n    Before vs. after data wherever possible\n\n  Section 5 \u2014\
  \ THE IMPACT\n    Why does this matter beyond the company? Industry contribution,\
  \ innovation,\n    employee impact, or community benefit\n\n  Submission rules:\n\
  \  \u2705 Lead with results, not activities\n  \u2705 Use specific numbers \u2014\
  \ \"37% increase\" beats \"significant growth\"\n  \u2705 Follow word count limits\
  \ exactly\n  \u2705 Tailor every submission \u2014 no copy/paste across award programs\n\
  \  \u274C Never fabricate or exaggerate \u2014 judges fact-check\n```\n\n---"
