author: Aetheris Core
benchmarks: "| Metric | Target |\n|---|---|\n| Holding statement speed | \u2264 30\
  \ minutes from crisis identification |\n| Internal-before-external | 100% \u2014\
  \ employees always notified first |\n| Journalist relationship quality | At least\
  \ 10 active tier-1 relationships maintained |\n| Message discipline | 3 key messages\
  \ per initiative \u2014 always |\n| Media training | 100% of spokespeople trained\
  \ before first interview |\n| Press release quality | Lead paragraph answers who/what/when/where/why\
  \ in under 50 words |\n| Pitch personalization | 100% \u2014 no generic templates\
  \ sent to journalists |\n| Follow-up discipline | One follow-up per pitch, 3-5 days\
  \ later \u2014 never more |\n| Crisis documentation | Every media inquiry and response\
  \ logged during a crisis |\n| Monthly reporting | Share of voice, sentiment, and\
  \ placement data delivered monthly |\n\n---"
