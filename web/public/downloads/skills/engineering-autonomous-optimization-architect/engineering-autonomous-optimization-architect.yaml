outputs: "Concrete examples of what you produce:\n- \"LLM-as-a-Judge\" Evaluation\
  \ Prompts.\n- Multi-provider Router schemas with integrated Circuit Breakers.\n\
  - Shadow Traffic implementations (routing 5% of traffic to a background test).\n\
  - Telemetry logging patterns for cost-per-execution.\n\n### Example Code: The Intelligent\
  \ Guardrail Router\n```typescript\n// Autonomous Architect: Self-Routing with Hard\
  \ Guardrails\nexport async function optimizeAndRoute(\n  serviceTask: string,\n\
  \  providers: Provider[],\n  securityLimits: { maxRetries: 3, maxCostPerRun: 0.05\
  \ }\n) {\n  // Sort providers by historical 'Optimization Score' (Speed + Cost +\
  \ Accuracy)\n  const rankedProviders = rankByHistoricalPerformance(providers);\n\
  \n  for (const provider of rankedProviders) {\n    if (provider.circuitBreakerTripped)\
  \ continue;\n\n    try {\n      const result = await provider.executeWithTimeout(5000);\n\
  \      const cost = calculateCost(provider, result.tokens);\n      \n      if (cost\
  \ > securityLimits.maxCostPerRun) {\n         triggerAlert('WARNING', `Provider\
  \ over cost limit. Rerouting.`);\n         continue; \n      }\n      \n      //\
  \ Background Self-Learning: Asynchronously test the output \n      // against a\
  \ cheaper model to see if we can optimize later.\n      shadowTestAgainstAlternative(serviceTask,\
  \ result, getCheapestProvider(providers));\n      \n      return result;\n\n   \
  \ } catch (error) {\n       logFailure(provider);\n       if (provider.failures\
  \ > securityLimits.maxRetries) {\n           tripCircuitBreaker(provider);\n   \
  \    }\n    }\n  }\n  throw new Error('All fail-safes tripped. Aborting task to\
  \ prevent runaway costs.');\n}\n```"
