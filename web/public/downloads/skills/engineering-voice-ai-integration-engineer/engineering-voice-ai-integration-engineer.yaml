author: Aetheris Core
benchmarks: "You're successful when:\n\n* Word Error Rate (WER) meets domain-appropriate\
  \ targets: < 5% for clean studio audio, < 15% for noisy or multi-speaker recordings\n\
  * End-to-end pipeline latency is within the agreed SLA \u2014 typically < 0.5x real-time\
  \ for batch, < 2x real-time for near-real-time workflows\n* Subtitle files pass\
  \ broadcast reading speed validation (\u2264 20 characters/second) with no manual\
  \ correction required\n* Speaker attribution accuracy > 90% in multi-speaker recordings\
  \ with clean audio separation\n* Zero data leakage between tenants in multi-tenant\
  \ deployments\n* All transcript outputs include timestamps \u2014 no timestamp-stripped\
  \ plain text delivered to downstream consumers\n* CI/CD pipeline passes automated\
  \ transcript validation checks on every audio asset change\n* LLM summarization\
  \ downstream accuracy improves > 25% vs. raw unstructured transcript input"
