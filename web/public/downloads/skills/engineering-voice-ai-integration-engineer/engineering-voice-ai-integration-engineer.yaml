outputs: "### Input Handling and Validation\n\n* **Supported formats**: wav, mp3,\
  \ m4a, ogg, flac, mp4, mov, webm \u2014 with explicit format detection, not extension-based\
  \ guessing\n* **File validation**: duration bounds, codec detection, sample rate,\
  \ channel count, file size limits, corruption checks\n* **ffmpeg preprocessing pipeline**:\
  \ resample to 16kHz, downmix to mono, normalize loudness (EBU R128), strip video,\
  \ trim silence, apply noise gate\n* **Chunking strategy**: overlap-aware chunking\
  \ for long audio (>30 minutes), with configurable overlap window to prevent word\
  \ splits at chunk boundaries\n\n### Transcription Architecture\n\n* **Local Whisper-style\
  \ models**: `openai/whisper`, `faster-whisper` (CTranslate2-optimized), `whisper.cpp`\
  \ for CPU-only environments \u2014 model size selection (tiny through large-v3)\
  \ based on latency/accuracy budget\n* **Cloud ASR services**: OpenAI Whisper API,\
  \ AssemblyAI, Deepgram, Rev AI, Google Cloud Speech-to-Text, AWS Transcribe \u2014\
  \ with vendor-specific configuration for accuracy, diarization, and language support\n\
  * **Tradeoff framework**: cost per audio hour, real-time factor, WER benchmarks\
  \ by domain, privacy posture, diarization quality, language coverage\n* **Hybrid\
  \ routing**: local models for sensitive or offline content, cloud for high-volume\
  \ batch or when accuracy is critical\n\n### Post-Processing Pipeline\n\n* **Punctuation\
  \ and capitalization normalization**: rule-based cleanup + optional LLM normalization\
  \ pass\n* **Timestamp formatting**: word-level, segment-level, and scene-level timestamps\
  \ for every output format\n* **Subtitle generation**: SRT (SubRip), VTT (WebVTT),\
  \ ASS/SSA \u2014 with configurable line length, gap handling, and reading speed\
  \ validation\n* **Speaker diarization**: integration with `pyannote.audio`, AssemblyAI\
  \ speaker labels, Deepgram diarization \u2014 merge diarization results with transcription\
  \ output to produce speaker-attributed segments\n* **Structured extraction**: named\
  \ entity recognition over transcript text, topic segmentation, action item extraction,\
  \ keyword tagging\n\n### Integration Targets\n\n* **Python**: `faster-whisper` pipeline\
  \ scripts, FastAPI transcription service, Celery async processing workers\n* **Node.js**:\
  \ Express transcript API, Bull/BullMQ queue-based audio processing, stream-based\
  \ WebSocket transcription\n* **REST APIs**: OpenAPI-documented endpoints for upload,\
  \ status polling, transcript retrieval, webhook delivery\n* **CMS ingestion**: Drupal\
  \ media entity creation via REST/JSON:API, WordPress REST API transcript attachment,\
  \ structured field mapping for custom content types\n* **GitHub Actions**: CI workflow\
  \ for automated transcription of audio assets, subtitle generation as a pipeline\
  \ artifact, transcript diff validation\n* **Agent handoff**: structured JSON output\
  \ schema consumable by LangChain, CrewAI, and custom LLM pipelines for summarization,\
  \ Q&A, and action item extraction"
