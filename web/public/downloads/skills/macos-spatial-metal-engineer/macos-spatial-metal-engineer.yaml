outputs: "### Metal Rendering Pipeline\n```swift\n// Core Metal rendering architecture\n\
  class MetalGraphRenderer {\n    private let device: MTLDevice\n    private let commandQueue:\
  \ MTLCommandQueue\n    private var pipelineState: MTLRenderPipelineState\n    private\
  \ var depthState: MTLDepthStencilState\n    \n    // Instanced node rendering\n\
  \    struct NodeInstance {\n        var position: SIMD3<Float>\n        var color:\
  \ SIMD4<Float>\n        var scale: Float\n        var symbolId: UInt32\n    }\n\
  \    \n    // GPU buffers\n    private var nodeBuffer: MTLBuffer        // Per-instance\
  \ data\n    private var edgeBuffer: MTLBuffer        // Edge connections\n    private\
  \ var uniformBuffer: MTLBuffer     // View/projection matrices\n    \n    func render(nodes:\
  \ [GraphNode], edges: [GraphEdge], camera: Camera) {\n        guard let commandBuffer\
  \ = commandQueue.makeCommandBuffer(),\n              let descriptor = view.currentRenderPassDescriptor,\n\
  \              let encoder = commandBuffer.makeRenderCommandEncoder(descriptor:\
  \ descriptor) else {\n            return\n        }\n        \n        // Update\
  \ uniforms\n        var uniforms = Uniforms(\n            viewMatrix: camera.viewMatrix,\n\
  \            projectionMatrix: camera.projectionMatrix,\n            time: CACurrentMediaTime()\n\
  \        )\n        uniformBuffer.contents().copyMemory(from: &uniforms, byteCount:\
  \ MemoryLayout<Uniforms>.stride)\n        \n        // Draw instanced nodes\n  \
  \      encoder.setRenderPipelineState(nodePipelineState)\n        encoder.setVertexBuffer(nodeBuffer,\
  \ offset: 0, index: 0)\n        encoder.setVertexBuffer(uniformBuffer, offset: 0,\
  \ index: 1)\n        encoder.drawPrimitives(type: .triangleStrip, vertexStart: 0,\
  \ \n                              vertexCount: 4, instanceCount: nodes.count)\n\
  \        \n        // Draw edges with geometry shader\n        encoder.setRenderPipelineState(edgePipelineState)\n\
  \        encoder.setVertexBuffer(edgeBuffer, offset: 0, index: 0)\n        encoder.drawPrimitives(type:\
  \ .line, vertexStart: 0, vertexCount: edges.count * 2)\n        \n        encoder.endEncoding()\n\
  \        commandBuffer.present(drawable)\n        commandBuffer.commit()\n    }\n\
  }\n```\n\n### Vision Pro Compositor Integration\n```swift\n// Compositor Services\
  \ for Vision Pro streaming\nimport CompositorServices\n\nclass VisionProCompositor\
  \ {\n    private let layerRenderer: LayerRenderer\n    private let remoteSpace:\
  \ RemoteImmersiveSpace\n    \n    init() async throws {\n        // Initialize compositor\
  \ with stereo configuration\n        let configuration = LayerRenderer.Configuration(\n\
  \            mode: .stereo,\n            colorFormat: .rgba16Float,\n          \
  \  depthFormat: .depth32Float,\n            layout: .dedicated\n        )\n    \
  \    \n        self.layerRenderer = try await LayerRenderer(configuration)\n   \
  \     \n        // Set up remote immersive space\n        self.remoteSpace = try\
  \ await RemoteImmersiveSpace(\n            id: \"CodeGraphImmersive\",\n       \
  \     bundleIdentifier: \"com.cod3d.vision\"\n        )\n    }\n    \n    func streamFrame(leftEye:\
  \ MTLTexture, rightEye: MTLTexture) async {\n        let frame = layerRenderer.queryNextFrame()\n\
  \        \n        // Submit stereo textures\n        frame.setTexture(leftEye,\
  \ for: .leftEye)\n        frame.setTexture(rightEye, for: .rightEye)\n        \n\
  \        // Include depth for proper occlusion\n        if let depthTexture = renderDepthTexture()\
  \ {\n            frame.setDepthTexture(depthTexture)\n        }\n        \n    \
  \    // Submit frame to Vision Pro\n        try? await frame.submit()\n    }\n}\n\
  ```\n\n### Spatial Interaction System\n```swift\n// Gaze and gesture handling for\
  \ Vision Pro\nclass SpatialInteractionHandler {\n    struct RaycastHit {\n     \
  \   let nodeId: String\n        let distance: Float\n        let worldPosition:\
  \ SIMD3<Float>\n    }\n    \n    func handleGaze(origin: SIMD3<Float>, direction:\
  \ SIMD3<Float>) -> RaycastHit? {\n        // Perform GPU-accelerated raycast\n \
  \       let hits = performGPURaycast(origin: origin, direction: direction)\n   \
  \     \n        // Find closest hit\n        return hits.min(by: { $0.distance <\
  \ $1.distance })\n    }\n    \n    func handlePinch(location: SIMD3<Float>, state:\
  \ GestureState) {\n        switch state {\n        case .began:\n            //\
  \ Start selection or manipulation\n            if let hit = raycastAtLocation(location)\
  \ {\n                beginSelection(nodeId: hit.nodeId)\n            }\n       \
  \     \n        case .changed:\n            // Update manipulation\n           \
  \ updateSelection(location: location)\n            \n        case .ended:\n    \
  \        // Commit action\n            if let selectedNode = currentSelection {\n\
  \                delegate?.didSelectNode(selectedNode)\n            }\n        }\n\
  \    }\n}\n```\n\n### Graph Layout Physics\n```metal\n// GPU-based force-directed\
  \ layout\nkernel void updateGraphLayout(\n    device Node* nodes [[buffer(0)]],\n\
  \    device Edge* edges [[buffer(1)]],\n    constant Params& params [[buffer(2)]],\n\
  \    uint id [[thread_position_in_grid]])\n{\n    if (id >= params.nodeCount) return;\n\
  \    \n    float3 force = float3(0);\n    Node node = nodes[id];\n    \n    // Repulsion\
  \ between all nodes\n    for (uint i = 0; i < params.nodeCount; i++) {\n       \
  \ if (i == id) continue;\n        \n        float3 diff = node.position - nodes[i].position;\n\
  \        float dist = length(diff);\n        float repulsion = params.repulsionStrength\
  \ / (dist * dist + 0.1);\n        force += normalize(diff) * repulsion;\n    }\n\
  \    \n    // Attraction along edges\n    for (uint i = 0; i < params.edgeCount;\
  \ i++) {\n        Edge edge = edges[i];\n        if (edge.source == id) {\n    \
  \        float3 diff = nodes[edge.target].position - node.position;\n          \
  \  float attraction = length(diff) * params.attractionStrength;\n            force\
  \ += normalize(diff) * attraction;\n        }\n    }\n    \n    // Apply damping\
  \ and update position\n    node.velocity = node.velocity * params.damping + force\
  \ * params.deltaTime;\n    node.position += node.velocity * params.deltaTime;\n\
  \    \n    // Write back\n    nodes[id] = node;\n}\n```"
