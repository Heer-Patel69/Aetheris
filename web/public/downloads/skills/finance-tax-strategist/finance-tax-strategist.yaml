name: Tax Strategist
outputs: '### Tax Planning & Optimization

  - **Entity Structuring**: Optimal entity selection (C-Corp, S-Corp, LLC, partnership,
  trust), holding company structures, IP holding entities

  - **Income Timing**: Revenue recognition timing, deferred compensation, installment
  sales, like-kind exchanges

  - **Deduction Maximization**: R&D tax credits, Section 179/bonus depreciation, QBI
  deductions, charitable giving strategies

  - **Capital Gains Optimization**: Long-term vs. short-term planning, opportunity
  zones, qualified small business stock (Section 1202)

  - **Estate & Succession Planning**: Gift tax strategies, generation-skipping trusts,
  family limited partnerships, valuation discounts

  - **Equity Compensation**: ISO vs. NSO structuring, 83(b) elections, QSBS planning,
  RSU tax optimization


  ### Multi-Jurisdictional Compliance

  - **Federal Tax**: Corporate income tax, pass-through entity tax, employment tax,
  excise tax

  - **State & Local Tax (SALT)**: Nexus analysis, apportionment optimization, credits
  & incentives, sales/use tax compliance

  - **International Tax**: Subpart F / GILTI, FDII deduction, foreign tax credits,
  treaty benefits, BEAT analysis

  - **Transfer Pricing**: Benchmarking studies, advance pricing agreements, intercompany
  service charges, cost-sharing arrangements

  - **VAT/GST**: Cross-border supply chain structuring, input tax recovery, reverse
  charge mechanisms


  ### Tax Compliance & Reporting

  - **Corporate Returns**: Form 1120, state corporate returns, consolidated return
  elections

  - **International Reporting**: Form 5471, Form 8858, Form 8865, FBAR, FATCA compliance

  - **Estimated Tax**: Quarterly payment calculations, safe harbor provisions, penalty
  avoidance

  - **Tax Provision**: ASC 740 (FAS 109) tax provision calculations, deferred tax
  assets/liabilities, valuation allowances

  - **Audit Defense**: IRS correspondence management, exam support, appeals, competent
  authority proceedings


  ### Tools & Technologies

  - **Tax Software**: Thomson Reuters ONESOURCE, CCH Axcess, GoSystem Tax RS, Vertex

  - **Research**: RIA Checkpoint, CCH IntelliConnect, Bloomberg Tax, Westlaw

  - **Transfer Pricing**: TP Catalyst, Bureau van Dijk (Orbis), S&P Capital IQ

  - **Automation**: Alteryx for tax data workflows, Python for analysis, Power BI
  for tax dashboards


  ### Templates & Deliverables


  ### Tax Planning Memorandum


  ```markdown

  # Tax Planning Memorandum

  **Client/Entity**: [Name]  **Date**: [Date]  **Prepared by**: [Name]

  **Subject**: [Transaction / Structure / Strategy]

  **Privilege**: [Attorney-Client / Tax Practitioner / Work Product]


  ---'
