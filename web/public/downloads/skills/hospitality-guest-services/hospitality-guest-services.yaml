  \ Enjoy your stay, [Name] \u2014 we're here if you\n  need anything.\"\n\n  Hand\
  \ key cards / digital key with a smile.\n  Never: Turn back to computer before guest\
  \ walks away.\n```\n\n### Complaint Resolution Framework\n\n```\nSERVICE RECOVERY\
  \ PROTOCOL\n\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n\
  The HEARD Method:\n  H \u2014 Hear the guest out completely. Do not interrupt.\n\
  \  E \u2014 Empathize genuinely. \"I completely understand why\n      that's frustrating.\"\
  \n  A \u2014 Apologize sincerely. \"I'm truly sorry this happened.\"\n  R \u2014\
  \ Resolve the issue \u2014 immediately if possible.\n  D \u2014 Delight with something\
  \ extra \u2014 go beyond what's expected.\n\nSTEP 1: LISTEN\n  Let the guest finish\
  \ completely before responding.\n  Take notes if needed.\n  Never: Interrupt, explain,\
  \ or defend during the guest's account.\n  Body language: Nodding, open posture,\
  \ full attention.\n\nSTEP 2: ACKNOWLEDGE & APOLOGIZE\n  \"I am so sorry this happened\
  \ during your stay. That is\n  absolutely not the experience we want you to have,\
  \ and\n  I completely understand your frustration.\"\n\n  Never: \"I apologize for\
  \ any inconvenience.\" (hollow phrase)\n  Never: \"That's not our policy.\" (before\
  \ offering a solution)\n  Always: Acknowledge the specific issue \u2014 not a generic\
  \ apology.\n\nSTEP 3: TAKE OWNERSHIP\n  \"Let me personally take care of this for\
  \ you right now.\"\n\n  Never: \"That's not my department.\"\n  Never: \"I'll have\
  \ someone look into that.\"\n  Always: Own the resolution even if someone else caused\
  \ the issue.\n\nSTEP 4: RESOLVE IMMEDIATELY\n  Noise complaint: Move the guest to\
  \ another room immediately.\n  Cleanliness issue: Send housekeeping within 15 minutes.\n\
  \  Maintenance issue: Send engineering within 15 minutes.\n  Billing error: Correct\
  \ on the spot \u2014 no \"we'll look into it.\"\n  Missing amenity: Deliver within\
  \ 15 minutes.\n  Restaurant complaint: Comp the item or the meal \u2014 manager\
  \ decision.\n\nSTEP 5: RECOVER BEYOND THE PROBLEM\n  Standard recovery options (match\
  \ to severity):\n  \U0001F7E2 Minor: Sincere apology + small gesture (amenity, points)\n\
  \  \U0001F7E1 Moderate: Apology + room amenity + points/discount\n  \U0001F534 Major:\
  \ Apology + significant compensation + manager follow-up\n  \U0001F6A8 Severe: Apology\
  \ + comp night + general manager contact\n\n  Recovery gesture ideas:\n  - Complimentary\
  \ room upgrade\n  - Amenity delivery (bottle of wine, dessert, fresh flowers)\n\
  \  - Loyalty points (specify amount)\n  - Discount on current or future stay\n \
  \ - Complimentary meal or room service\n  - Late checkout\n\nSTEP 6: FOLLOW UP\n\
  \  \"I'm going to personally follow up with you [this evening /\n  tomorrow morning]\
  \ to make sure everything is to your\n  satisfaction. Is [time] a good time to reach\
  \ you?\"\n\n  Follow-up is not optional. If you commit to it \u2014 do it.\n\nDOCUMENTATION\n\
  \  Document every complaint:\n  - Guest name and room number\n  - Nature of complaint\n\
  \  - Time reported and time resolved\n  - Resolution provided\n  - Recovery compensation\
  \ offered\n  - Follow-up completed\n  - Guest satisfaction at resolution\n```\n\n\
  ### Concierge Services Guide\n\n```\nCONCIERGE SERVICE MENU\n\u2500\u2500\u2500\u2500\
