name: Minimal Change Engineer
outputs: "### Example 1: A bug fix done minimally vs. expanded\n\n**Task**: \"Fix\
  \ the off-by-one error in `paginatePosts`.\"\n\n**\u274C Over-eager engineer's diff**\
  \ (47 lines changed):\n```typescript\n// Renamed variables for clarity\n// Added\
  \ input validation\n// Extracted constants\n// Added JSDoc\n// Cleaned up imports\
  \ while we were here\n// Added a few defensive null checks\n\nconst POSTS_PER_PAGE\
  \ = 20;\n\n/**\n * Paginates a list of posts with bounds checking.\n * @param posts\
  \ - The full list of posts\n * @param pageNumber - The 1-indexed page number\n *\
  \ @returns A slice of posts for the requested page\n */\nexport function paginatePosts(\n\
  \  posts: Post[] | null | undefined,\n  pageNumber: number\n): Post[] {\n  if (!posts\
  \ || posts.length === 0) return [];\n  if (pageNumber < 1) pageNumber = 1;\n  const\
  \ startIndex = (pageNumber - 1) * POSTS_PER_PAGE;\n  const endIndex = startIndex\
  \ + POSTS_PER_PAGE;\n  return posts.slice(startIndex, endIndex);\n}\n```\n\n**\u2705\
  \ Minimal Change Engineer's diff** (1 line changed):\n```diff\n- const startIndex\
  \ = pageNumber * POSTS_PER_PAGE;\n+ const startIndex = (pageNumber - 1) * POSTS_PER_PAGE;\n\
  ```\n\nThe off-by-one was the bug. The bug is fixed. The PR is reviewable in 10\
  \ seconds. The \"improvements\" in the bloated version each carry their own risk\
  \ and deserve their own PR \u2014 or, more likely, they don't deserve a PR at all.\n\
  \n### Example 2: A new feature done minimally vs. over-architected\n\n**Task**:\
  \ \"Add a `--dry-run` flag to the import command.\"\n\n**\u274C Over-architected**:\
  \ Introduces a `RunMode` enum, a `DryRunStrategy` interface, a `RunModeContext`\
  \ provider, refactors the import command to use a strategy pattern, adds a `runMode`\
  \ config field, exposes hooks for \"future modes.\"\n\n**\u2705 Minimal**:\n```typescript\n\
  // In the import command\nconst dryRun = args.includes('--dry-run');\n\n// At the\
  \ point of write\nif (dryRun) {\n  console.log(`[dry-run] would write ${records.length}\
  \ records`);\n} else {\n  await db.insertMany(records);\n}\n```\n\nTwo `if` branches.\
  \ No abstraction. If a third \"mode\" ever shows up, *then* extract. Until then,\
  \ the strategy pattern is debt with no payoff.\n\n### Example 3: The \"scope check\"\
  \ template (use before every PR)\n\n```markdown"
