name: Customer Service
outputs: "### Standard Customer Interaction Opening\n\n```\nCUSTOMER GREETING\n\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n\"Thanks for reaching\
  \ out to [Business Name]! My name is [Agent],\nand I'm happy to help you today.\
  \ Who do I have the pleasure of\nspeaking with?\n\n[After name provided:]\nGreat\
  \ to meet you, [Customer Name]! What can I help you with today?\"\n\nTone: Warm,\
  \ energetic, and genuinely attentive.\nNever: \"State your issue.\" / \"What's your\
  \ problem?\" / \"Account number first.\"\n```\n\n### FAQ Response Framework\n\n\
  ```\nFAQ RESPONSE STRUCTURE\n\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
  \u2500\u2500\nStep 1 \u2014 CONFIRM the question\n  \"Great question \u2014 let\
  \ me make sure I give you the most accurate\n  answer. You're asking about [restate\
  \ question], correct?\"\n\nStep 2 \u2014 ANSWER clearly and in plain language\n\
  \  - Lead with the direct answer\n  - Follow with any necessary context\n  - Avoid\
  \ jargon, acronyms, or internal terminology\n\nStep 3 \u2014 VERIFY understanding\n\
  \  \"Does that answer your question, or would you like me to go into\n  more detail\
  \ on any part of that?\"\n\nStep 4 \u2014 OFFER next steps\n  \"Is there anything\
  \ else I can help you with today?\"\n\nFAQ escalation triggers:\n  - Question requires\
  \ account-specific information \u2192 verify identity first\n  - Question involves\
  \ legal, compliance, or contractual terms \u2192 route to specialist\n  - Answer\
  \ is unclear or outside your knowledge base \u2192 escalate rather than guess\n\
  ```\n\n### Complaint Handling Framework\n\n```\nCOMPLAINT RESPONSE PROTOCOL\n\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nStep 1 \u2014 ACKNOWLEDGE\
  \ (never skip)\n  \"I'm really sorry to hear that happened \u2014 that's not the\
  \ experience\n  we want you to have, and I completely understand your frustration.\"\
  \n\nStep 2 \u2014 VALIDATE\n  \"Your feedback matters to us, and this is something\
  \ I want to\n  make right for you.\"\n\nStep 3 \u2014 CLARIFY\n  \"So I can resolve\
  \ this properly, can you help me understand\n  exactly what happened?\"\n\nStep\
  \ 4 \u2014 ACT\n  - Identify the resolution: immediate fix, credit, replacement,\
  \ escalation\n  - Communicate the resolution clearly\n  - Give a specific timeline\n\
  \nStep 5 \u2014 CLOSE WITH COMMITMENT\n  \"Here's what I'm going to do: [specific\
  \ action] by [specific time].\n  I want to make sure this is fully resolved for\
  \ you.\"\n\nImmediate escalation triggers:\n  - Customer mentions legal action\n\
  \  - Customer expresses intent to leave or cancel\n  - Complaint involves a safety\
  \ issue\n  - Resolution requires authority beyond your level\n```\n\n### Account\
  \ Support Framework\n\n```\nACCOUNT SUPPORT STRUCTURE\n\u2500\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\nIdentity verification (before any account\
  \ access):\n  - Full name\n  - Email address on file\n  - One additional identifier\
  \ (account number, phone, last transaction)\n\nCommon account actions:\n  Password\
  \ reset:\n    \"I can send a password reset link to the email on your account\n\
  \    right now \u2014 would that work for you?\"\n\n  Subscription change:\n   \
  \ \"I can make that change for you right now. Just to confirm,\n    you'd like to\
  \ [upgrade/downgrade/cancel] your [plan name]\n    effective [date]. Is that correct?\"\
  \n\n  Profile update:\n    \"I've updated your [field] to [new value]. You should\
  \ see\n    that reflected in your account within [timeframe].\"\n\n  Account closure:\n\
  \    Never process immediately \u2014 always explore retention first:\n    \"I'd\
  \ love to understand what's prompted this so we can see\n    if there's anything\
  \ we can do. May I ask what's driving\n    the decision?\"\n```\n\n### Returns,\
  \ Refunds & Order Support\n\n```\nORDER SUPPORT FRAMEWORK\n\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\nOrder status inquiry:\n  \"Let me pull\
  \ up your order right now. [Order number/email lookup]\n  Your order is currently\
  \ [status] and is expected to [arrive/ship]\n  by [date]. [Add tracking link if\
  \ available.]\"\n\nReturn initiation:\n  \"I can get that return started for you\
  \ right now. Here's how\n  it works: [return process in plain language]. You should\
  \ receive\n  your [refund/exchange] within [timeframe].\"\n\nRefund language:\n\
  \  \"I've processed your refund of [amount]. Depending on your bank,\n  this typically\
  \ takes [3-5 business days] to appear. Is there\n  anything else I can help you\
  \ with?\"\n\nDamaged or wrong item:\n  \"I'm so sorry about that \u2014 that's completely\
  \ unacceptable and\n  I want to make it right immediately. I can [resend the correct\n\
  \  item / issue a full refund / provide a credit]. Which would\n  you prefer?\"\n\
  \nShipping delay:\n  \"I understand how frustrating a delay can be, especially when\n\
  \  you were expecting it by [date]. Here's the latest status:\n  [info]. I've also\
  \ [flagged this / applied a credit / waived\n  shipping on your next order] as an\
  \ apology for the inconvenience.\"\n```\n\n### Retention & Cancellation Framework\n\
  \n```\nRETENTION RESPONSE PROTOCOL\n\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\nNever process a cancellation without a retention attempt.\n\n\
  Step 1 \u2014 UNDERSTAND\n  \"I'd hate to see you go \u2014 before I process this,\
  \ may I ask\n  what's prompted the decision? I want to make sure we've done\n  everything\
  \ we can.\"\n\nStep 2 \u2014 ADDRESS the root cause\n  - Price concern \u2192 offer\
  \ discount, downgrade, or pause option\n  - Product dissatisfaction \u2192 offer\
  \ support, training, or replacement\n  - Competitor \u2192 acknowledge, highlight\
  \ your unique value honestly\n  - Life change \u2192 offer pause or reduced plan\n\
  \nStep 3 \u2014 PRESENT an alternative\n  \"Rather than cancelling outright, would\
  \ you be open to [pausing\n  your account / switching to our [lower tier] plan /\
  \ a [X]%\n  discount for the next [period]]? I want to make sure we find\n  something\
  \ that works for you.\"\n\nStep 4 \u2014 RESPECT the decision\n  If the customer\
  \ still wants to cancel after a genuine retention\n  attempt, process it gracefully:\n\
  \  \"I completely respect that. I've processed your cancellation\n  effective [date].\
  \ You're always welcome back \u2014 I'll make a note\n  of your feedback so we can\
  \ keep improving. Is there anything\n  else I can help you with today?\"\n```\n\n\
  ### Escalation Protocol\n\n```\nESCALATION FRAMEWORK\n\u2500\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\nEscalation triggers:\n  IMMEDIATE:\n  - Safety\
  \ concern of any kind\n  - Legal threat or mention of attorney\n  - Social media\
  \ escalation threat from a high-profile account\n  - Situation beyond your resolution\
  \ authority\n\n  URGENT (same interaction):\n  - Customer has repeated the same\
  \ issue more than once\n  - Resolution requires account credits above your authority\n\
  \  - Customer is extremely distressed or threatening to leave\n\n  STANDARD:\n \
  \ - Complex technical issue requiring specialist\n  - Billing dispute requiring\
  \ finance review\n  - Feedback requiring management attention\n\nWarm transfer language:\n\
  \  \"I want to make sure you get the absolute best help for this.\n  I'm going to\
  \ connect you with [specialist/team], who handles\n  exactly this type of situation.\
  \ I'll brief them on everything\n  so you won't have to repeat yourself. Is that\
  \ okay?\"\n\nAlways:\n  1. Brief the receiving party before transferring\n  2. Stay\
  \ on the line until connection is confirmed\n  3. Give the customer a direct callback\
  \ number\n  4. Never cold transfer\n```\n\n---"
