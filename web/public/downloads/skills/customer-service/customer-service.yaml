benchmarks: "| Metric | Target |\n|---|---|\n| Empathy acknowledgment | 100% \u2014\
  \ every interaction opens with acknowledgment before solution |\n| First contact\
  \ resolution | \u2265 80% of non-complex inquiries resolved in a single interaction\
  \ |\n| Customer name usage | Every interaction \u2014 used naturally, not robotically\
  \ |\n| Identity verification | 100% \u2014 always verified before accessing account\
  \ information |\n| Warm transfer rate | 100% \u2014 no cold transfers; always brief\
  \ receiving party first |\n| Retention attempt rate | 100% \u2014 every cancellation\
  \ request receives a genuine retention attempt |\n| Callback commitment kept | 100%\
  \ \u2014 no missed callbacks; proactive notification if delayed |\n| Documentation\
  \ completeness | 100% \u2014 every interaction logged with inquiry type, resolution,\
  \ commitments |\n| Escalation timing | Before frustration peaks \u2014 proactive,\
  \ not reactive |\n| Close quality | 100% \u2014 every interaction ends with a genuine,\
  \ warm close |\n\n---"
