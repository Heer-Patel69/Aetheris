outputs: "### WordPress: Custom Theme Structure\n\n```\nmy-theme/\n\u251C\u2500\u2500\
  \ style.css              # Theme header only \u2014 no styles here\n\u251C\u2500\
  \u2500 functions.php          # Enqueue scripts, register features\n\u251C\u2500\
  \u2500 index.php\n\u251C\u2500\u2500 header.php / footer.php\n\u251C\u2500\u2500\
  \ page.php / single.php / archive.php\n\u251C\u2500\u2500 template-parts/      \
  \  # Reusable partials\n\u2502   \u251C\u2500\u2500 content-card.php\n\u2502   \u2514\
  \u2500\u2500 hero.php\n\u251C\u2500\u2500 inc/\n\u2502   \u251C\u2500\u2500 custom-post-types.php\n\
  \u2502   \u251C\u2500\u2500 taxonomies.php\n\u2502   \u251C\u2500\u2500 acf-fields.php\
  \     # ACF field group registration (JSON sync)\n\u2502   \u2514\u2500\u2500 enqueue.php\n\
  \u251C\u2500\u2500 assets/\n\u2502   \u251C\u2500\u2500 css/\n\u2502   \u251C\u2500\
  \u2500 js/\n\u2502   \u2514\u2500\u2500 images/\n\u2514\u2500\u2500 acf-json/  \
  \            # ACF field group sync directory\n```\n\n### WordPress: Custom Plugin\
  \ Boilerplate\n\n```php\n<?php\n/**\n * Plugin Name: My Agency Plugin\n * Description:\
  \ Custom functionality for [Client].\n * Version: 1.0.0\n * Requires at least: 6.0\n\
  \ * Requires PHP: 8.1\n */\n\nif ( ! defined( 'ABSPATH' ) ) {\n    exit;\n}\n\n\
  define( 'MY_PLUGIN_VERSION', '1.0.0' );\ndefine( 'MY_PLUGIN_PATH', plugin_dir_path(\
  \ __FILE__ ) );\n\n// Autoload classes\nspl_autoload_register( function ( $class\
  \ ) {\n    $prefix = 'MyPlugin\\\\';\n    $base_dir = MY_PLUGIN_PATH . 'src/';\n\
  \    if ( strncmp( $prefix, $class, strlen( $prefix ) ) !== 0 ) return;\n    $file\
  \ = $base_dir . str_replace( '\\\\', '/', substr( $class, strlen( $prefix ) ) )\
  \ . '.php';\n    if ( file_exists( $file ) ) require $file;\n} );\n\nadd_action(\
  \ 'plugins_loaded', [ new MyPlugin\\Core\\Bootstrap(), 'init' ] );\n```\n\n### WordPress:\
  \ Register Custom Post Type (code, not UI)\n\n```php\nadd_action( 'init', function\
  \ () {\n    register_post_type( 'case_study', [\n        'labels'       => [\n \
  \           'name'          => 'Case Studies',\n            'singular_name' => 'Case\
  \ Study',\n        ],\n        'public'        => true,\n        'has_archive' \
  \  => true,\n        'show_in_rest'  => true,   // Gutenberg + REST API support\n\
  \        'menu_icon'     => 'dashicons-portfolio',\n        'supports'      => [\
  \ 'title', 'editor', 'thumbnail', 'excerpt', 'custom-fields' ],\n        'rewrite'\
  \       => [ 'slug' => 'case-studies' ],\n    ] );\n} );\n```\n\n### Drupal: Custom\
  \ Module Structure\n\n```\nmy_module/\n\u251C\u2500\u2500 my_module.info.yml\n\u251C\
  \u2500\u2500 my_module.module\n\u251C\u2500\u2500 my_module.routing.yml\n\u251C\u2500\
  \u2500 my_module.services.yml\n\u251C\u2500\u2500 my_module.permissions.yml\n\u251C\
  \u2500\u2500 my_module.links.menu.yml\n\u251C\u2500\u2500 config/\n\u2502   \u2514\
  \u2500\u2500 install/\n\u2502       \u2514\u2500\u2500 my_module.settings.yml\n\u2514\
  \u2500\u2500 src/\n    \u251C\u2500\u2500 Controller/\n    \u2502   \u2514\u2500\
  \u2500 MyController.php\n    \u251C\u2500\u2500 Form/\n    \u2502   \u2514\u2500\
  \u2500 SettingsForm.php\n    \u251C\u2500\u2500 Plugin/\n    \u2502   \u2514\u2500\
  \u2500 Block/\n    \u2502       \u2514\u2500\u2500 MyBlock.php\n    \u2514\u2500\
  \u2500 EventSubscriber/\n        \u2514\u2500\u2500 MySubscriber.php\n```\n\n###\
  \ Drupal: Module info.yml\n\n```yaml\nname: My Module\ntype: module\ndescription:\
  \ 'Custom functionality for [Client].'\ncore_version_requirement: ^10 || ^11\npackage:\
  \ Custom\ndependencies:\n  - drupal:node\n  - drupal:views\n```\n\n### Drupal: Implementing\
  \ a Hook\n\n```php\n<?php\n// my_module.module\n\nuse Drupal\\Core\\Entity\\EntityInterface;\n\
  use Drupal\\Core\\Session\\AccountInterface;\nuse Drupal\\Core\\Access\\AccessResult;\n\
  \n/**\n * Implements hook_node_access().\n */\nfunction my_module_node_access(EntityInterface\
  \ $node, $op, AccountInterface $account) {\n  if ($node->bundle() === 'case_study'\
  \ && $op === 'view') {\n    return $account->hasPermission('view case studies')\n\
  \      ? AccessResult::allowed()->cachePerPermissions()\n      : AccessResult::forbidden()->cachePerPermissions();\n\
  \  }\n  return AccessResult::neutral();\n}\n```\n\n### Drupal: Custom Block Plugin\n\
  \n```php\n<?php\nnamespace Drupal\\my_module\\Plugin\\Block;\n\nuse Drupal\\Core\\\
  Block\\BlockBase;\nuse Drupal\\Core\\Block\\Attribute\\Block;\nuse Drupal\\Core\\\
  StringTranslation\\TranslatableMarkup;\n\n#[Block(\n  id: 'my_custom_block',\n \
  \ admin_label: new TranslatableMarkup('My Custom Block'),\n)]\nclass MyBlock extends\
  \ BlockBase {\n\n  public function build(): array {\n    return [\n      '#theme'\
  \ => 'my_custom_block',\n      '#attached' => ['library' => ['my_module/my-block']],\n\
  \      '#cache' => ['max-age' => 3600],\n    ];\n  }\n\n}\n```\n\n### WordPress:\
  \ Gutenberg Custom Block (block.json + JS + PHP render)\n\n**block.json**\n```json\n\
  {\n  \"$schema\": \"https://schemas.wp.org/trunk/block.json\",\n  \"apiVersion\"\
  : 3,\n  \"name\": \"my-theme/case-study-card\",\n  \"title\": \"Case Study Card\"\
  ,\n  \"category\": \"my-theme\",\n  \"description\": \"Displays a case study teaser\
  \ with image, title, and excerpt.\",\n  \"supports\": { \"html\": false, \"align\"\
  : [\"wide\", \"full\"] },\n  \"attributes\": {\n    \"postId\":   { \"type\": \"\
  number\" },\n    \"showLogo\": { \"type\": \"boolean\", \"default\": true }\n  },\n\
  \  \"editorScript\": \"file:./index.js\",\n  \"render\": \"file:./render.php\"\n\
  }\n```\n\n**render.php**\n```php\n<?php\n$post = get_post( $attributes['postId']\
  \ ?? 0 );\nif ( ! $post ) return;\n$show_logo = $attributes['showLogo'] ?? true;\n\
  ?>\n<article <?php echo get_block_wrapper_attributes( [ 'class' => 'case-study-card'\
  \ ] ); ?>>\n    <?php if ( $show_logo && has_post_thumbnail( $post ) ) : ?>\n  \
  \      <div class=\"case-study-card__image\">\n            <?php echo get_the_post_thumbnail(\
  \ $post, 'medium', [ 'loading' => 'lazy' ] ); ?>\n        </div>\n    <?php endif;\
  \ ?>\n    <div class=\"case-study-card__body\">\n        <h3 class=\"case-study-card__title\"\
  >\n            <a href=\"<?php echo esc_url( get_permalink( $post ) ); ?>\">\n \
  \               <?php echo esc_html( get_the_title( $post ) ); ?>\n            </a>\n\
  \        </h3>\n        <p class=\"case-study-card__excerpt\"><?php echo esc_html(\
  \ get_the_excerpt( $post ) ); ?></p>\n    </div>\n</article>\n```\n\n### WordPress:\
  \ Custom ACF Block (PHP render callback)\n\n```php\n// In functions.php or inc/acf-fields.php\n\
  add_action( 'acf/init', function () {\n    acf_register_block_type( [\n        'name'\
  \            => 'testimonial',\n        'title'           => 'Testimonial',\n  \
  \      'render_callback' => 'my_theme_render_testimonial',\n        'category' \
  \       => 'my-theme',\n        'icon'            => 'format-quote',\n        'keywords'\
  \        => [ 'quote', 'review' ],\n        'supports'        => [ 'align' => false,\
  \ 'jsx' => true ],\n        'example'         => [ 'attributes' => [ 'mode' => 'preview'\
  \ ] ],\n    ] );\n} );\n\nfunction my_theme_render_testimonial( $block ) {\n   \
  \ $quote  = get_field( 'quote' );\n    $author = get_field( 'author_name' );\n \
  \   $role   = get_field( 'author_role' );\n    $classes = 'testimonial-block ' .\
  \ esc_attr( $block['className'] ?? '' );\n    ?>\n    <blockquote class=\"<?php\
  \ echo trim( $classes ); ?>\">\n        <p class=\"testimonial-block__quote\"><?php\
  \ echo esc_html( $quote ); ?></p>\n        <footer class=\"testimonial-block__attribution\"\
  >\n            <strong><?php echo esc_html( $author ); ?></strong>\n           \
  \ <?php if ( $role ) : ?><span><?php echo esc_html( $role ); ?></span><?php endif;\
  \ ?>\n        </footer>\n    </blockquote>\n    <?php\n}\n```\n\n### WordPress:\
  \ Enqueue Scripts & Styles (correct pattern)\n\n```php\nadd_action( 'wp_enqueue_scripts',\
  \ function () {\n    $theme_ver = wp_get_theme()->get( 'Version' );\n\n    wp_enqueue_style(\n\
  \        'my-theme-styles',\n        get_stylesheet_directory_uri() . '/assets/css/main.css',\n\
  \        [],\n        $theme_ver\n    );\n\n    wp_enqueue_script(\n        'my-theme-scripts',\n\
  \        get_stylesheet_directory_uri() . '/assets/js/main.js',\n        [],\n \
  \       $theme_ver,\n        [ 'strategy' => 'defer' ]   // WP 6.3+ defer/async\
  \ support\n    );\n\n    // Pass PHP data to JS\n    wp_localize_script( 'my-theme-scripts',\
  \ 'MyTheme', [\n        'ajaxUrl' => admin_url( 'admin-ajax.php' ),\n        'nonce'\
  \   => wp_create_nonce( 'my-theme-nonce' ),\n        'homeUrl' => home_url(),\n\
  \    ] );\n} );\n```\n\n### Drupal: Twig Template with Accessible Markup\n\n```twig\n\
  {# templates/node/node--case-study--teaser.html.twig #}\n{%\n  set classes = [\n\
  \    'node',\n    'node--type-' ~ node.bundle|clean_class,\n    'node--view-mode-'\
  \ ~ view_mode|clean_class,\n    'case-study-card',\n  ]\n%}\n\n<article{{ attributes.addClass(classes)\
  \ }}>\n\n  {% if content.field_hero_image %}\n    <div class=\"case-study-card__image\"\
  \ aria-hidden=\"true\">\n      {{ content.field_hero_image }}\n    </div>\n  {%\
  \ endif %}\n\n  <div class=\"case-study-card__body\">\n    <h3 class=\"case-study-card__title\"\
  >\n      <a href=\"{{ url }}\" rel=\"bookmark\">{{ label }}</a>\n    </h3>\n\n \
  \   {% if content.body %}\n      <div class=\"case-study-card__excerpt\">\n    \
  \    {{ content.body|without('#printed') }}\n      </div>\n    {% endif %}\n\n \
  \   {% if content.field_client_logo %}\n      <div class=\"case-study-card__logo\"\
  >\n        {{ content.field_client_logo }}\n      </div>\n    {% endif %}\n  </div>\n\
  \n</article>\n```\n\n### Drupal: Theme .libraries.yml\n\n```yaml\n# my_theme.libraries.yml\n\
  global:\n  version: 1.x\n  css:\n    theme:\n      assets/css/main.css: {}\n  js:\n\
  \    assets/js/main.js: { attributes: { defer: true } }\n  dependencies:\n    -\
  \ core/drupal\n    - core/once\n\ncase-study-card:\n  version: 1.x\n  css:\n   \
  \ component:\n      assets/css/components/case-study-card.css: {}\n  dependencies:\n\
  \    - my_theme/global\n```\n\n### Drupal: Preprocess Hook (theme layer)\n\n```php\n\
  <?php\n// my_theme.theme\n\n/**\n * Implements template_preprocess_node() for case_study\
  \ nodes.\n */\nfunction my_theme_preprocess_node__case_study(array &$variables):\
  \ void {\n  $node = $variables['node'];\n\n  // Attach component library only when\
  \ this template renders.\n  $variables['#attached']['library'][] = 'my_theme/case-study-card';\n\
  \n  // Expose a clean variable for the client name field.\n  if ($node->hasField('field_client_name')\
  \ && !$node->get('field_client_name')->isEmpty()) {\n    $variables['client_name']\
  \ = $node->get('field_client_name')->value;\n  }\n\n  // Add structured data for\
  \ SEO.\n  $variables['#attached']['html_head'][] = [\n    [\n      '#type'     \
  \  => 'html_tag',\n      '#tag'        => 'script',\n      '#value'      => json_encode([\n\
  \        '@context' => 'https://schema.org',\n        '@type'    => 'Article',\n\
  \        'name'     => $node->getTitle(),\n      ]),\n      '#attributes' => ['type'\
  \ => 'application/ld+json'],\n    ],\n    'case-study-schema',\n  ];\n}\n```\n\n\
