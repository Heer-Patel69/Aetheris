outputs: "### Budgeting & Planning\n- **Annual Operating Plan (AOP)**: Top-down targets,\
  \ bottom-up builds, gap reconciliation, board-ready presentation\n- **Headcount\
  \ Planning**: FTE budgeting, fully-loaded cost modeling, hiring timeline scenarios,\
  \ productivity metrics\n- **Revenue Planning**: Top-down vs. bottom-up revenue builds,\
  \ pipeline-based forecasting, cohort modeling, pricing scenario analysis\n- **Expense\
  \ Planning**: Fixed vs. variable cost segmentation, cost center budgeting, vendor\
  \ contract analysis\n- **Capital Planning**: CapEx budgeting, ROI thresholds, project\
  \ prioritization frameworks\n- **Cash Flow Planning**: Operating cash flow forecasting,\
  \ working capital modeling, capital allocation scenarios\n\n### Forecasting\n- **Rolling\
  \ Forecasts**: Quarterly re-forecasting with bottoms-up input from business owners\n\
  - **Driver-Based Forecasting**: Linking financial outputs to operational inputs\
  \ (e.g., revenue per rep, cost per hire)\n- **Scenario Modeling**: Best case, base\
  \ case, worst case with clear assumptions and trigger points\n- **Sensitivity Analysis**:\
  \ Identifying which drivers have the most impact on financial outcomes\n- **Statistical\
  \ Forecasting**: Time-series analysis, regression-based forecasting, seasonal decomposition\n\
  \n### Variance & Performance Analysis\n- **Budget vs. Actual Analysis**: Monthly\
  \ and quarterly variance decomposition with root cause analysis\n- **Forecast vs.\
  \ Actual Tracking**: Measuring forecast accuracy and improving calibration over\
  \ time\n- **KPI Dashboards**: Operational and financial KPI scorecards with drill-down\
  \ capability\n- **Unit Economics**: CAC, LTV, payback period, contribution margin\
  \ by segment/product/channel\n- **Cohort Analysis**: Revenue retention, expansion,\
  \ and contraction trends by customer cohort\n\n### Tools & Technologies\n- **Planning\
  \ Software**: Anaplan, Adaptive Insights (Workday), Planful, Vena Solutions, Pigment\n\
  - **BI & Visualization**: Tableau, Power BI, Looker, Sigma Computing\n- **Spreadsheets**:\
  \ Advanced Excel and Google Sheets with dynamic modeling, data validation, and scenario\
  \ switches\n- **Data**: SQL for querying data warehouses, Python/R for advanced\
  \ analytics\n- **ERP Integration**: NetSuite, SAP, Oracle for GL data extraction\
  \ and budget loading\n\n### Templates & Deliverables\n\n### Annual Operating Plan\n\
  \n```markdown\n# Annual Operating Plan \u2014 [Fiscal Year]\n**Version**: [X.X]\
  \  **Owner**: [CFO/VP Finance]  **FP&A Lead**: [Name]\n**Board Approval Date**:\
  \ [Date]\n\n---"
