outputs: "### Spark Pipeline (PySpark + Delta Lake)\n```python\nfrom pyspark.sql import\
  \ SparkSession\nfrom pyspark.sql.functions import col, current_timestamp, sha2,\
  \ concat_ws, lit\nfrom delta.tables import DeltaTable\n\nspark = SparkSession.builder\
  \ \\\n    .config(\"spark.sql.extensions\", \"io.delta.sql.DeltaSparkSessionExtension\"\
  ) \\\n    .config(\"spark.sql.catalog.spark_catalog\", \"org.apache.spark.sql.delta.catalog.DeltaCatalog\"\
  ) \\\n    .getOrCreate()\n\n# \u2500\u2500 Bronze: raw ingest (append-only, schema-on-read)\
  \ \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\ndef ingest_bronze(source_path:\
  \ str, bronze_table: str, source_system: str) -> int:\n    df = spark.read.format(\"\
  json\").option(\"inferSchema\", \"true\").load(source_path)\n    df = df.withColumn(\"\
  _ingested_at\", current_timestamp()) \\\n           .withColumn(\"_source_system\"\
  , lit(source_system)) \\\n           .withColumn(\"_source_file\", col(\"_metadata.file_path\"\
  ))\n    df.write.format(\"delta\").mode(\"append\").option(\"mergeSchema\", \"true\"\
  ).save(bronze_table)\n    return df.count()\n\n# \u2500\u2500 Silver: cleanse, deduplicate,\
  \ conform \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\ndef upsert_silver(bronze_table:\
  \ str, silver_table: str, pk_cols: list[str]) -> None:\n    source = spark.read.format(\"\
  delta\").load(bronze_table)\n    # Dedup: keep latest record per primary key based\
  \ on ingestion time\n    from pyspark.sql.window import Window\n    from pyspark.sql.functions\
  \ import row_number, desc\n    w = Window.partitionBy(*pk_cols).orderBy(desc(\"\
  _ingested_at\"))\n    source = source.withColumn(\"_rank\", row_number().over(w)).filter(col(\"\
  _rank\") == 1).drop(\"_rank\")\n\n    if DeltaTable.isDeltaTable(spark, silver_table):\n\
  \        target = DeltaTable.forPath(spark, silver_table)\n        merge_condition\
  \ = \" AND \".join([f\"target.{c} = source.{c}\" for c in pk_cols])\n        target.alias(\"\
  target\").merge(source.alias(\"source\"), merge_condition) \\\n            .whenMatchedUpdateAll()\
  \ \\\n            .whenNotMatchedInsertAll() \\\n            .execute()\n    else:\n\
  \        source.write.format(\"delta\").mode(\"overwrite\").save(silver_table)\n\
  \n# \u2500\u2500 Gold: aggregated business metric \u2500\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\ndef build_gold_daily_revenue(silver_orders:\
  \ str, gold_table: str) -> None:\n    df = spark.read.format(\"delta\").load(silver_orders)\n\
  \    gold = df.filter(col(\"status\") == \"completed\") \\\n             .groupBy(\"\
  order_date\", \"region\", \"product_category\") \\\n             .agg({\"revenue\"\
  : \"sum\", \"order_id\": \"count\"}) \\\n             .withColumnRenamed(\"sum(revenue)\"\
  , \"total_revenue\") \\\n             .withColumnRenamed(\"count(order_id)\", \"\
  order_count\") \\\n             .withColumn(\"_refreshed_at\", current_timestamp())\n\
  \    gold.write.format(\"delta\").mode(\"overwrite\") \\\n        .option(\"replaceWhere\"\
  , f\"order_date >= '{gold['order_date'].min()}'\") \\\n        .save(gold_table)\n\
  ```\n\n### dbt Data Quality Contract\n```yaml\n# models/silver/schema.yml\nversion:\
  \ 2\n\nmodels:\n  - name: silver_orders\n    description: \"Cleansed, deduplicated\
  \ order records. SLA: refreshed every 15 min.\"\n    config:\n      contract:\n\
  \        enforced: true\n    columns:\n      - name: order_id\n        data_type:\
  \ string\n        constraints:\n          - type: not_null\n          - type: unique\n\
  \        tests:\n          - not_null\n          - unique\n      - name: customer_id\n\
  \        data_type: string\n        tests:\n          - not_null\n          - relationships:\n\
  \              to: ref('silver_customers')\n              field: customer_id\n \
  \     - name: revenue\n        data_type: decimal(18, 2)\n        tests:\n     \
  \     - not_null\n          - dbt_expectations.expect_column_values_to_be_between:\n\
  \              min_value: 0\n              max_value: 1000000\n      - name: order_date\n\
  \        data_type: date\n        tests:\n          - not_null\n          - dbt_expectations.expect_column_values_to_be_between:\n\
  \              min_value: \"'2020-01-01'\"\n              max_value: \"current_date\"\
  \n\n    tests:\n      - dbt_utils.recency:\n          datepart: hour\n         \
  \ field: _updated_at\n          interval: 1  # must have data within last hour\n\
  ```\n\n### Pipeline Observability (Great Expectations)\n```python\nimport great_expectations\
  \ as gx\n\ncontext = gx.get_context()\n\ndef validate_silver_orders(df) -> dict:\n\
  \    batch = context.sources.pandas_default.read_dataframe(df)\n    result = batch.validate(\n\
  \        expectation_suite_name=\"silver_orders.critical\",\n        run_id={\"\
  run_name\": \"silver_orders_daily\", \"run_time\": datetime.now()}\n    )\n    stats\
  \ = {\n        \"success\": result[\"success\"],\n        \"evaluated\": result[\"\
  statistics\"][\"evaluated_expectations\"],\n        \"passed\": result[\"statistics\"\
  ][\"successful_expectations\"],\n        \"failed\": result[\"statistics\"][\"unsuccessful_expectations\"\
  ],\n    }\n    if not result[\"success\"]:\n        raise DataQualityException(f\"\
  Silver orders failed validation: {stats['failed']} checks failed\")\n    return\
  \ stats\n```\n\n### Kafka Streaming Pipeline\n```python\nfrom pyspark.sql.functions\
  \ import from_json, col, current_timestamp\nfrom pyspark.sql.types import StructType,\
  \ StringType, DoubleType, TimestampType\n\norder_schema = StructType() \\\n    .add(\"\
  order_id\", StringType()) \\\n    .add(\"customer_id\", StringType()) \\\n    .add(\"\
  revenue\", DoubleType()) \\\n    .add(\"event_time\", TimestampType())\n\ndef stream_bronze_orders(kafka_bootstrap:\
  \ str, topic: str, bronze_path: str):\n    stream = spark.readStream \\\n      \
  \  .format(\"kafka\") \\\n        .option(\"kafka.bootstrap.servers\", kafka_bootstrap)\
  \ \\\n        .option(\"subscribe\", topic) \\\n        .option(\"startingOffsets\"\
  , \"latest\") \\\n        .option(\"failOnDataLoss\", \"false\") \\\n        .load()\n\
  \n    parsed = stream.select(\n        from_json(col(\"value\").cast(\"string\"\
  ), order_schema).alias(\"data\"),\n        col(\"timestamp\").alias(\"_kafka_timestamp\"\
  ),\n        current_timestamp().alias(\"_ingested_at\")\n    ).select(\"data.*\"\
  , \"_kafka_timestamp\", \"_ingested_at\")\n\n    return parsed.writeStream \\\n\
  \        .format(\"delta\") \\\n        .outputMode(\"append\") \\\n        .option(\"\
  checkpointLocation\", f\"{bronze_path}/_checkpoint\") \\\n        .option(\"mergeSchema\"\
  , \"true\") \\\n        .trigger(processingTime=\"30 seconds\") \\\n        .start(bronze_path)\n\
  ```"
