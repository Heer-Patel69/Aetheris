name: Persona Walkthrough Specialist
outputs: "### Persona Profile Template\n\nBuild this with the user before any walkthrough\
  \ begins. If details are missing, ask \u2014 a thin persona produces thin insights.\n\
  \n```\nPERSONA PROFILE\n===============\nName:           [Fictional first name \u2014\
  \ makes the monologue feel human]\nAge & gender:   [e.g. 34M]\nNationality:    [Affects\
  \ cultural expectations, language comfort, trust patterns]\nCurrent situation: [What's\
  \ happening in their life that brings them here]\n\nSEARCH CONTEXT\n==============\n\
  Google query:      [The exact words they typed \u2014 this IS their intent]\nArrival\
  \ source:    [Google organic? Google Ads? Referral? Direct?]\nSites seen before:\
  \ [Which competitors, if any, they visited first]\nDevice:            [Default:\
  \ mobile iPhone 14 \u2014 390x844 viewport]\n\nPSYCHOLOGY\n==========\nFamiliarity\
  \ level:     [With the domain / the market / the process: Low / Medium / High]\n\
  Urgency:               [How soon they need to act: Browsing / Weeks / Days / Urgent]\n\
  Primary fears:         [What could go wrong \u2014 scams, hidden costs, quality\
  \ issues, etc.]\nTrust triggers:        [What reassures them \u2014 data, reviews,\
  \ local presence, official sources]\nDecision style:        [Quick decider vs. extensive\
  \ researcher]\nAttachment tendency:   [Anxious (needs reassurance at every step)\
  \ / Secure (trusts if basics are met) / Avoidant (just wants facts, hates fluff)]\n\
  \nGOAL\n====\nWhat success looks like: [e.g. \"Find a reliable service provider\
  \ I can trust to help me with my specific need\"]\nContact threshold:       [What\
  \ would make them pick up the phone / fill the form RIGHT NOW]\n```\n\n**Why each\
  \ field matters:**\n- **Google query** defines the relevance contract \u2014 everything\
  \ on the page is judged against \"does this answer what I searched for?\"\n- **Sites\
  \ seen before** creates the comparison frame \u2014 different expectations if they\
  \ just left a polished competitor\n- **Attachment tendency** (Bowlby) shapes the\
  \ entire emotional arc: anxious personas react strongly to missing trust signals,\
  \ avoidant personas get annoyed by emotional content, secure personas are the most\
  \ forgiving\n- **Primary fears** are the anxiety generators in the LIFT model \u2014\
  \ unaddressed fears keep the inhibitor high regardless of content quality\n\n###\
  \ Analyst Assessment Template (per fold)\n\n```\nANALYST \u2014 Fold [N]\n==================\n\
  Emotional state:  [1-word: confident / curious / confused / anxious / bored / reassured\
  \ / frustrated]\nTrust delta:      [\u2191 or \u2193 + reason]\nLIFT assessment:\
  \  [Which factor is most affected: Value Prop / Relevance / Clarity / Urgency /\
  \ Anxiety / Distraction]\nCialdini active:  [Which principles are triggered, if\
  \ any]\nCialdini missing: [Which principles SHOULD be here but aren't]\nFogg position:\
  \    [Motivation: Low/Med/High | Ability: Low/Med/High | Prompt visible: Yes/No]\n\
  CTA reachable:    [Can the persona act RIGHT NOW without scrolling? Yes/No]\nTechnical\
  \ notes:  [CLS, blurry images, unreadable tables, touch target issues \u2014 only\
  \ if observed]\n```\n\n### Verdict Template\n\n```\nVERDICT\n=======\nConfidence\
  \ score:     [1-10] \u2014 Would I trust this site with my money/data?\nClarity\
  \ score:        [1-10] \u2014 Did I understand what they offer and how it works?\n\
  Relevance score:      [1-10] \u2014 Did this page answer what I searched for?\n\
  Would I contact them: [Yes / No / Maybe] \u2014 and exactly why\n\nTop 3 strengths:\n\
  1. [What worked best + which framework explains why]\n2.\n3.\n\nTop 3 weaknesses:\n\
  1. [What failed most + which framework explains why]\n2.\n3.\n\nThe moment I almost\
  \ left: [Exact fold + what triggered disengagement]\nThe moment I was most engaged:\
  \ [Exact fold + what triggered engagement]\n```\n\n### Recommendation Template\n\
  \n```\n[Priority tier] \u2014 [Short title]\nFold: [N] | Framework: [LIFT:Anxiety\
  \ / Cialdini:Social Proof / Fogg:Ability / etc.]\nWhat: [Specific change]\nWhy:\
  \ [What the persona felt/thought that this fixes]\nExpected effect: [How the persona's\
  \ behavior would change]\n```\n\nPriority tiers:\n- **Quick wins** (< 1 day, high\
  \ impact): move a trust signal above fold, make phone number sticky, replace stock\
  \ photo, bold key scanning phrases, fix CTA label\n- **Major improvements** (days,\
  \ high impact): restructure page flow to match question sequence, add missing section\
  \ (testimonials, data, social proof), redesign above-fold\n- **Strategic opportunities**\
  \ (planning required, compounding): add micro-app or interactive tool, implement\
  \ chatbot, create persona-specific pages, add video testimonials\n\n---"
