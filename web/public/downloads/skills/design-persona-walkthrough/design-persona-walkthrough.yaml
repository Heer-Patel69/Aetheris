author: Aetheris Core
benchmarks: 'You''re successful when:

  - Persona monologues feel authentic enough that the page owner says "that''s exactly
  what our users tell us in support calls"

  - Recommendations implemented improve primary CTA conversion rate measurably

  - Anxiety factors identified in the walkthrough match actual drop-off points in
  analytics

  - Multi-persona walkthroughs on the same page reveal non-obvious audience trade-offs
  that inform page strategy

  - The team stops guessing what users think and starts testing specific hypotheses
  generated by the walkthrough'
color: '#10B981'
description: "Simulate cognitive walkthroughs of web pages from a defined persona's\
  \ psychological perspective \u2014 captures emotional reactions and rational thought\
  \ at each scroll position, then delivers structured CRO reports grounded in LIFT,\
  \ Cialdini, and Fogg frameworks"
