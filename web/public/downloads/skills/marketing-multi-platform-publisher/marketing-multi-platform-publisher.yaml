outputs: "### Parameter Intake Table\nAlways present collected params before execution:\n\
  \n| Param | Required | Example |\n|---|---|---|\n| `topic` or `source_file` | \u2705\
  \ | \"YOLO11 Edge Deployment\" or `article.md` |\n| `target_platforms` | \u2705\
  \ | `zhihu,csdn,bilibili` or \"auto-decide\" |\n| `cover_image` | optional | `cover.png`\
  \ |\n| `tags` | optional | `AI,Python,EdgeAI` |\n| `category` | optional (CSDN/B\u7AD9\
  \u4E13\u680F) | `AI` |\n| `is_original` | \u2705 | `true / false (translation/repost)`\
  \ |\n\n### Tool Invocation Templates\n\n**Main channel (Wechatsync)**:\n```bash\n\
  wechatsync auth                                                # check auth\nwechatsync\
  \ sync article.md -p zhihu,csdn,bilibili --cover cover.png\nwechatsync extract -o\
  \ article.md                                # from current browser tab\n```\n\n\
  **\u5C0F\u7EA2\u4E66 fallback (xhs-mcp)**:\n```bash\nxiaohongshu-mcp -headless=false\
  \ &  # start daemon\ncurl -X POST http://localhost:18060/api/v1/publish \\\n  -H\
  \ 'Content-Type: application/json' \\\n  -d '{\"title\":\"\u226420 chars\",\"content\"\
  :\"...\",\"images\":[\"/abs/img.jpg\"],\"tags\":[\"...\"],\"is_original\":true}'\n\
  ```\n\n**B \u7AD9 video (biliup)**:\n```bash\nbiliup login                     \
  \                               # one-time scan\nbiliup upload --title \"...\" --tag\
  \ \"AI,Python\" --tid 171 \\\n              --cover cover.jpg --copyright 1 video.mp4\n\
  ```\n\n**B \u7AD9 dynamic / programmatic article (bilibili-api-python)**:\n```python\n\
  from bilibili_api import article, dynamic, Credential\ncredential = Credential(sessdata=\"\
  ...\", bili_jct=\"...\", buvid3=\"...\")\n# Cookies from F12 \u2192 Application\
  \ \u2192 Cookies \u2192 bilibili.com\n```\n\n### Status Report Template\nAfter execution,\
  \ return a results table:\n\n| Platform | Status | Draft URL | Notes |\n|---|---|---|---|\n\
  | \u77E5\u4E4E | \u2705 | https://zhuanlan.zhihu.com/... | adapted by @zhihu-strategist\
  \ |\n| CSDN | \u2705 | https://mp.csdn.net/... | category=AI, tags=Python,YOLO |\n\
  | B\u7AD9\u4E13\u680F | \u26A0\uFE0F | (cookie expired, see below) | suggest re-login\
  \ |\n| \u5C0F\u7EA2\u4E66 | \u2705 | https://creator.xiaohongshu.com/... | via xhs-mcp\
  \ fallback |"
