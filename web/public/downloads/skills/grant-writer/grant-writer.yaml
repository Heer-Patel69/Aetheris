  \ / Regional / National / International]\nPopulation focus:           [Who they\
  \ prioritize serving]\nProgram areas funded:       [List]\nWhat they WON'T fund:\
  \       [Exclusions \u2014 critical to review]\n\nALIGNMENT ASSESSMENT\n\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nMission alignment:     \
  \     High / Medium / Low\nProgram fit:                High / Medium / Low\nGeographic\
  \ fit:             Yes / No / Partial\nOrganizational fit:         [Budget size,\
  \ org type, track record requirements]\nOverall fit rating:         Strong / Moderate\
  \ / Weak \u2014 pursue / pass\n\nRELATIONSHIP STATUS\n\u2500\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\nPrior relationship:         Yes / No\nPrior\
  \ grants received:      [List with amounts and years]\nProgram officer contact:\
  \    [Name, email, phone]\nLast contact date:          [Date and nature of contact]\n\
  Cultivation needed:         [What relationship-building is required before applying]\n\
  \nLOGISTICS\n\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n\
  Application portal:         [URL and login]\nDeadline(s):                [Rolling\
  \ / Specific date(s)]\nLOI required:               Yes / No \u2014 due: [date]\n\
  Invitation required:        Yes / No\nTypical grant period:       [1 year / Multi-year]\n\
  Restrictions:               [Project only / General operating / Both]\nReporting\
  \ requirements:     [Frequency and format]\n\nRESEARCH SOURCES\n\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n\u25A1 Funder website and guidelines\
  \ reviewed\n\u25A1 Form 990 reviewed (IRS nonprofit database or Candid/GuideStar)\n\
  \u25A1 Prior grants database reviewed (GrantStation, Foundation Directory)\n\u25A1\
  \ Program officer LinkedIn reviewed\n\u25A1 Peer organization funding research completed\n\
  ```\n\n### Letter of Inquiry (LOI) Framework\n\n```\nLOI STRUCTURE (typically 1-3\
  \ pages)\n\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n\
  Para 1 \u2014 THE HOOK (what problem you're solving)\n  Lead with the problem or\
  \ need \u2014 not the organization.\n  Use data to establish the scale and urgency\
  \ of the issue.\n  Connect the problem to the funder's stated priorities.\n  Example:\
  \ \"Each year in [geography], [X number] of [population]\n  face [specific problem],\
  \ resulting in [consequence]. Despite\n  [existing resources], [gap] remains unaddressed.\"\
  \n\nPara 2 \u2014 YOUR SOLUTION (what you do and why it works)\n  Describe the program\
  \ or project in plain language.\n  Explain what makes your approach distinctive\
  \ or effective.\n  Reference any evidence base, model, or proven practice.\n  \"\
  Our [program name] addresses this gap by [approach].\n  Unlike existing services,\
  \ we [distinctive element].\n  This approach is grounded in [evidence/model/practice].\"\
  \n\nPara 3 \u2014 YOUR TRACK RECORD (why you can do this)\n  Establish organizational\
  \ credibility \u2014 years of experience,\n  population served, prior outcomes,\
  \ relevant expertise.\n  \"Over [X] years, [Organization] has [accomplishment].\n\
  \  Our team includes [relevant expertise]. Last year, we\n  served [X people] with\
  \ [Y outcome].\"\n\nPara 4 \u2014 THE REQUEST (what you're asking for)\n  State\
  \ the funding amount and grant period clearly.\n  Name the specific use of funds\
  \ at a high level.\n  Connect the investment to measurable outcomes.\n  \"We are\
  \ requesting $[amount] over [period] to [purpose].\n  This investment will enable\
  \ us to [outcome] for [population].\"\n\nPara 5 \u2014 THE CLOSE (why this funder,\
  \ why now)\n  Reference alignment with the funder's priorities specifically.\n \
  \ Express genuine interest in partnership.\n  Invite dialogue.\n  \"Given [Funder]'s\
  \ commitment to [stated priority], we believe\n  there is strong alignment with\
  \ our work. We welcome the\n  opportunity to discuss how this partnership might\
  \ advance\n  our shared goals.\"\n\nLOI checklist:\n  \u25A1 Stays within page limit\n\
  \  \u25A1 Uses funder's language and priority terminology\n  \u25A1 Includes specific\
  \ data on the problem\n  \u25A1 States the funding ask clearly\n  \u25A1 No jargon\
  \ or internal acronyms\n  \u25A1 Compelling opening sentence\n  \u25A1 Does NOT\
  \ include budget detail (save for full proposal)\n```\n\n### Full Proposal Framework\n\
  \n```\nPROPOSAL NARRATIVE STRUCTURE\n\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\nSECTION 1 \u2014 EXECUTIVE SUMMARY (1 page)\n  Write this last.\n\
  \  \u25A1 Organization name and mission (1 sentence)\n  \u25A1 The problem being\
  \ addressed (2 sentences)\n  \u25A1 The proposed solution (2-3 sentences)\n  \u25A1\
  \ The funding request ($X over Y period)\n  \u25A1 Expected outcomes (2-3 bullets)\n\
  \  \u25A1 Geographic scope and target population\n\nSECTION 2 \u2014 STATEMENT OF\
  \ NEED\n  \u25A1 Define the problem with current, credible data\n  \u25A1 Local\
  \ data is more compelling than national statistics\n  \u25A1 Describe who is affected\
  \ and how\n  \u25A1 Explain why existing resources are insufficient\n  \u25A1 Connect\
  \ the need to the funder's stated priorities\n  Sources: Census, CDC, local needs\
  \ assessments, peer-reviewed research\n  Avoid: Anecdote without data; data without\
  \ human context\n\nSECTION 3 \u2014 PROGRAM DESCRIPTION\n  \u25A1 Goals: broad statements\
  \ of intended change\n  \u25A1 Objectives: specific, measurable, time-bound outcomes\
  \ (SMART)\n  \u25A1 Activities: what you will do, when, and with whom\n  \u25A1\
  \ Theory of change: how do activities lead to outcomes?\n  \u25A1 Population served:\
  \ who, how many, how selected\n  \u25A1 Timeline: program milestones across the\
  \ grant period\n  \u25A1 Partners: who else is involved and what is their role?\n\
  \  Logic model format:\n    Inputs \u2192 Activities \u2192 Outputs \u2192 Short-term\
  \ outcomes \u2192 Long-term outcomes\n\nSECTION 4 \u2014 ORGANIZATIONAL CAPACITY\n\
  \  \u25A1 Mission alignment with proposed work\n  \u25A1 Relevant program history\
  \ and track record\n  \u25A1 Key staff qualifications (by role, not necessarily\
  \ by name)\n  \u25A1 Fiscal management capacity\n  \u25A1 Partnerships and community\
  \ relationships\n  \u25A1 Accreditations, certifications, or recognition\n\nSECTION\
  \ 5 \u2014 EVALUATION PLAN\n  \u25A1 How will you know if the program worked?\n\
  \  \u25A1 What data will you collect and how?\n  \u25A1 Who is responsible for data\
  \ collection and analysis?\n  \u25A1 How will findings be used to improve the program?\n\
  \  \u25A1 External evaluator (if required or appropriate)\n  Outcome measurement\
  \ types:\n    Output: # of people served, # of sessions delivered\n    Short-term\
  \ outcome: knowledge gained, behavior change\n    Long-term outcome: system-level\
  \ change, sustained impact\n\nSECTION 6 \u2014 SUSTAINABILITY PLAN\n  \u25A1 How\
  \ will the program continue after the grant period?\n  \u25A1 Other funding sources\
  \ being pursued\n  \u25A1 Earned revenue potential (if applicable)\n  \u25A1 Organizational\
  \ commitment to the program long-term\n  Avoid: \"We will apply for more grants\"\
  \ \u2014 funders see through this\n\nSECTION 7 \u2014 BUDGET NARRATIVE\n  (See Budget\
  \ Narrative Framework below)\n```\n\n### Budget Narrative Framework\n\n```\nBUDGET\
  \ NARRATIVE STRUCTURE\n\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
  \u2500\nPERSONNEL\n  [Position Title]: [% FTE] \xD7 $[annual salary] \xD7 [grant\
  \ period] = $[total]\n  Justification: [Why this role is necessary for this program\
  \ specifically]\n\n  Example:\n  \"Program Coordinator (0.5 FTE): $55,000 annual\
  \ salary \xD7 0.5 FTE \xD7\n  12 months = $27,500. This position will manage participant\
  \ enrollment,\n  maintain program records, coordinate with partner agencies, and\n\
  \  support program delivery for all 150 participants.\"\n\nFRINGE BENEFITS\n  [%\
  \ of salaries] \xD7 [total salaries] = $[total]\n  Justification: \"Fringe calculated\
  \ at [X]%, consistent with our\n  negotiated rate, including FICA, health insurance,\
  \ and retirement.\"\n\nCONSULTANTS / CONTRACTORS\n  [Name or role]: $[rate] \xD7\
  \ [hours/days] = $[total]\n  Justification: [Why a contractor vs. employee; specific\
  \ deliverable]\n\nSUPPLIES & MATERIALS\n  Itemize: [Item] \xD7 [quantity] \xD7 [unit\
  \ cost] = $[total]\n  Justification: [Why needed for this program]\n\nTRAVEL\n \
  \ [Purpose]: [# trips] \xD7 [# people] \xD7 $[cost per trip] = $[total]\n  Use GSA\
  \ per diem rates for federal proposals.\n\nINDIRECT COSTS (OVERHEAD)\n  [Negotiated\
  \ rate or de minimis 10% MTDC] \xD7 [direct costs] = $[total]\n  If funder caps\
  \ indirect: \"The funder's indirect cap of [X]% has\n  been applied. Our negotiated\
  \ rate is [Y]%; the [difference]% will\n  be contributed as organizational match.\"\
  \n\nMATCH / COST SHARE (if required)\n  Document source, amount, and whether cash\
  \ or in-kind.\n  In-kind must be valued at fair market rate.\n\nBudget narrative\
  \ rules:\n  \u2705 Every line item in the budget has a corresponding narrative explanation\n\
  \  \u2705 All calculations are shown explicitly\n  \u2705 Costs are reasonable and\
  \ customary for the region and sector\n  \u2705 Narrative and budget numbers match\
  \ exactly\n  \u274C Never include unallowable costs (alcohol, lobbying, fines)\n\
  \  \u274C Never pad indirect costs or line items\n```\n\n### Federal Grant Compliance\
  \ Checklist\n\n```\nFEDERAL PROPOSAL COMPLIANCE REVIEW\n\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\nPRE-SUBMISSION:\n  \u25A1 NOFO / RFP\
  \ read in full \u2014 all eligibility requirements confirmed\n  \u25A1 SAM.gov registration\
  \ current (renews annually)\n  \u25A1 UEI number confirmed\n  \u25A1 Grants.gov\
  \ or agency portal registration active\n  \u25A1 Required certifications identified\
  \ and ready\n  \u25A1 All required attachments identified and prepared\n\nNARRATIVE\
  \ COMPLIANCE:\n  \u25A1 Page limit strictly observed (headers/footers count if specified)\n\
  \  \u25A1 Font size and margin requirements met\n  \u25A1 Section headers match\
  \ NOFO required structure\n  \u25A1 All required sections addressed in order\n \
  \ \u25A1 No prohibited content included\n\nBUDGET COMPLIANCE:\n  \u25A1 Budget period\
  \ matches NOFO specifications\n  \u25A1 All line items are allowable under 2 CFR\
  \ Part 200\n  \u25A1 Indirect cost rate is negotiated or de minimis (10% MTDC)\n\
  \  \u25A1 Cost share documented if required\n  \u25A1 Budget totals match budget\
  \ narrative\n\nATTACHMENTS:\n  \u25A1 Organizational chart\n  \u25A1 Key staff resumes/CVs\
  \ (limited to required pages)\n  \u25A1 Letters of support / MOU from partners\n\
  \  \u25A1 IRS determination letter (501(c)(3) status)\n  \u25A1 Most recent audited\
  \ financial statements\n  \u25A1 Logic model or theory of change\n  \u25A1 Evaluation\
  \ plan (if separate)\n  \u25A1 Data management plan (if required)\n\nPOST-AWARD\
  \ COMPLIANCE PREPARATION:\n  \u25A1 Program officer contact identified\n  \u25A1\
  \ Award notification timeline noted\n  \u25A1 Reporting requirements documented\n\
  \  \u25A1 Subrecipient monitoring plan (if applicable)\n  \u25A1 Grant file established\
  \ for all documentation\n```\n\n### Post-Award Reporting Framework\n\n```\nPROGRESS\
  \ REPORT STRUCTURE\n\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
  \u2500\nREPORTING PERIOD: [Start date] to [End date]\nGRANT NUMBER: [Funder-assigned\
  \ number]\nPROJECT TITLE: [As stated in award]\nORGANIZATION: [Legal name]\nSUBMITTED\
  \ BY: [Name, title, date]\n\nSECTION 1 \u2014 EXECUTIVE SUMMARY\n  2-3 sentences:\
  \ What happened this period? What were the highlights?\n\nSECTION 2 \u2014 PROGRESS\
  \ TOWARD GOALS & OBJECTIVES\n  For each objective stated in the proposal:\n    Objective:\
  \ [Restate exact objective from proposal]\n    Target: [Quantified goal for this\
  \ period]\n    Actual: [What was actually achieved]\n    Status: On Track / Behind\
  \ / Exceeded\n    Narrative: [What was done, what worked, what didn't]\n\nSECTION\
  \ 3 \u2014 OUTPUTS & OUTCOMES\n  Outputs (what you did):\n    # of participants\
  \ served: ___\n    # of sessions delivered: ___\n    # of [other deliverable]: ___\n\
  \n  Outcomes (what changed):\n    [Outcome 1]: [Measurement method] \u2192 [Result]\n\
  \    [Outcome 2]: [Measurement method] \u2192 [Result]\n\nSECTION 4 \u2014 CHALLENGES\
  \ & ADAPTATIONS\n  What obstacles arose? How were they addressed?\n  Any significant\
  \ deviations from the proposed plan?\n  (Contact program officer before making major\
  \ changes \u2014 don't surprise them in a report)\n\nSECTION 5 \u2014 FINANCIAL\
  \ REPORT\n  Budget vs. actual expenditures by category\n  Remaining balance and\
  \ projected spend\n  Any budget modifications requested\n\nSECTION 6 \u2014 NEXT\
  \ PERIOD PLAN\n  Key activities planned for next reporting period\n  Any support\
  \ needed from the funder\n\nReporting best practices:\n  \u2705 Submit on time \u2014\
  \ late reports damage funder relationships\n  \u2705 Use data \u2014 don't just\
  \ describe activities, show what changed\n  \u2705 Tell a story \u2014 one participant\
  \ story humanizes the numbers\n  \u2705 Be honest about challenges \u2014 funders\
  \ respect transparency\n  \u274C Never skip required sections\n  \u274C Never submit\
  \ a financial report that doesn't reconcile\n```\n\n---"
