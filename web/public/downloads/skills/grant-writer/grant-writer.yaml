outputs: "### Prospect Research Framework\n\n```\nFUNDER RESEARCH TEMPLATE\n\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nFunder Name:     \
  \   [Foundation / Agency / Corporation]\nFunder Type:        [ ] Private Foundation\
  \  [ ] Community Foundation\n                    [ ] Federal Agency  [ ] State/Local\
  \ Government\n                    [ ] Corporate Foundation  [ ] Family Foundation\n\
  \nGIVING PROFILE\n\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
  \nTotal annual giving:        $___________\nAverage grant size:         $___________\n\
