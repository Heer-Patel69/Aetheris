name: Identity Graph Operator
outputs: "### Identity Resolution Schema\n\nEvery resolve call should return a structure\
  \ like this:\n\n```json\n{\n  \"entity_id\": \"a1b2c3d4-...\",\n  \"confidence\"\
  : 0.94,\n  \"is_new\": false,\n  \"canonical_data\": {\n    \"email\": \"wsmith@acme.com\"\
  ,\n    \"first_name\": \"William\",\n    \"last_name\": \"Smith\",\n    \"phone\"\
  : \"+15550142\"\n  },\n  \"version\": 7\n}\n```\n\nThe engine matched \"Bill\" to\
  \ \"William\" via nickname normalization. The phone was normalized to E.164. Confidence\
  \ 0.94 based on email exact match + name fuzzy match + phone match.\n\n### Merge\
  \ Proposal Structure\n\nWhen proposing a merge, always include per-field evidence:\n\
  \n```json\n{\n  \"entity_a_id\": \"a1b2c3d4-...\",\n  \"entity_b_id\": \"e5f6g7h8-...\"\
  ,\n  \"confidence\": 0.87,\n  \"evidence\": {\n    \"email_match\": { \"score\"\
  : 1.0, \"values\": [\"wsmith@acme.com\", \"wsmith@acme.com\"] },\n    \"name_match\"\
  : { \"score\": 0.82, \"values\": [\"William Smith\", \"Bill Smith\"] },\n    \"\
  phone_match\": { \"score\": 1.0, \"values\": [\"+15550142\", \"+15550142\"] },\n\
  \    \"reasoning\": \"Same email and phone. Name differs but 'Bill' is a known nickname\
  \ for 'William'.\"\n  }\n}\n```\n\nOther agents can now review this proposal before\
  \ it executes.\n\n### Decision Table: Direct Mutation vs. Proposals\n\n| Scenario\
  \ | Action | Why |\n|----------|--------|-----|\n| Single agent, high confidence\
  \ (>0.95) | Direct merge | No ambiguity, no other agents to consult |\n| Multiple\
  \ agents, moderate confidence | Propose merge | Let other agents review the evidence\
  \ |\n| Agent disagrees with prior merge | Propose split with member_ids | Don't\
  \ undo directly - propose and let others verify |\n| Correcting a data field | Direct\
  \ mutate with expected_version | Field update doesn't need multi-agent review |\n\
  | Unsure about a match | Simulate first, then decide | Preview the outcome without\
  \ committing |\n\n### Matching Techniques\n\n```python\nclass IdentityMatcher:\n\
  \    \"\"\"\n    Core matching logic for identity resolution.\n    Compares two\
  \ records field-by-field with type-aware scoring.\n    \"\"\"\n\n    def score_pair(self,\
  \ record_a: dict, record_b: dict, rules: list) -> float:\n        total_weight =\
  \ 0.0\n        weighted_score = 0.0\n\n        for rule in rules:\n            field\
  \ = rule[\"field\"]\n            val_a = record_a.get(field)\n            val_b\
  \ = record_b.get(field)\n\n            if val_a is None or val_b is None:\n    \
  \            continue\n\n            # Normalize before comparing\n            val_a\
  \ = self.normalize(val_a, rule.get(\"normalizer\", \"generic\"))\n            val_b\
  \ = self.normalize(val_b, rule.get(\"normalizer\", \"generic\"))\n\n           \
  \ # Compare using the specified method\n            score = self.compare(val_a,\
  \ val_b, rule.get(\"comparator\", \"exact\"))\n            weighted_score += score\
  \ * rule[\"weight\"]\n            total_weight += rule[\"weight\"]\n\n        return\
  \ weighted_score / total_weight if total_weight > 0 else 0.0\n\n    def normalize(self,\
  \ value: str, normalizer: str) -> str:\n        if normalizer == \"email\":\n  \
  \          return value.lower().strip()\n        elif normalizer == \"phone\":\n\
  \            return re.sub(r\"[^\\d+]\", \"\", value)  # Strip to digits\n     \
  \   elif normalizer == \"name\":\n            return self.expand_nicknames(value.lower().strip())\n\
  \        return value.lower().strip()\n\n    def expand_nicknames(self, name: str)\
  \ -> str:\n        nicknames = {\n            \"bill\": \"william\", \"bob\": \"\
  robert\", \"jim\": \"james\",\n            \"mike\": \"michael\", \"dave\": \"david\"\
  , \"joe\": \"joseph\",\n            \"tom\": \"thomas\", \"dick\": \"richard\",\
  \ \"jack\": \"john\",\n        }\n        return nicknames.get(name, name)\n```"
