outputs: "### Structural Split: Side-by-Side Sections\n```php\n// Two related sections\
  \ placed side by side \u2014 cuts vertical scroll in half\nGrid::make(2)\n    ->schema([\n\
  \        Section::make('Sleep')\n            ->icon('heroicon-o-moon')\n       \
  \     ->schema([\n                TimePicker::make('bedtime')->required(),\n   \
  \             TimePicker::make('wake_time')->required(),\n                // range\
  \ slider instead of radio row:\n                TextInput::make('sleep_quality')\n\
  \                    ->extraInputAttributes(['type' => 'range', 'min' => 1, 'max'\
  \ => 10, 'step' => 1])\n                    ->label('Sleep Quality (1\u201310)')\n\
  \                    ->default(5),\n            ]),\n        Section::make('Morning\
  \ Energy')\n            ->icon('heroicon-o-bolt')\n            ->schema([\n    \
  \            TextInput::make('energy_morning')\n                    ->extraInputAttributes(['type'\
  \ => 'range', 'min' => 1, 'max' => 10, 'step' => 1])\n                    ->label('Energy\
  \ after waking (1\u201310)')\n                    ->default(5),\n            ]),\n\
  \    ])\n    ->columnSpanFull(),\n```\n\n### Tab-Based Form Restructure\n```php\n\
  Tabs::make('EnergyLog')\n    ->tabs([\n        Tabs\\Tab::make('Overview')\n   \
  \         ->icon('heroicon-o-calendar-days')\n            ->schema([\n         \
  \       DatePicker::make('date')->required(),\n                // summary placeholder\
  \ on edit:\n                Placeholder::make('summary')\n                    ->content(fn\
  \ ($record) => $record\n                        ? \"Sleep: {$record->sleep_quality}/10\
  \ \xB7 Morning: {$record->energy_morning}/10\"\n                        : null\n\
  \                    )\n                    ->hiddenOn('create'),\n            ]),\n\
  \        Tabs\\Tab::make('Sleep & Energy')\n            ->icon('heroicon-o-bolt')\n\
  \            ->schema([/* sleep + energy sections side by side */]),\n        Tabs\\\
  Tab::make('Nutrition')\n            ->icon('heroicon-o-cake')\n            ->schema([/*\
  \ food repeater */]),\n        Tabs\\Tab::make('Crashes & Notes')\n            ->icon('heroicon-o-exclamation-triangle')\n\
  \            ->schema([/* crashes repeater + notes textarea */]),\n    ])\n    ->columnSpanFull()\n\
  \    ->persistTabInQueryString(),\n```\n\n### Repeater with Meaningful Item Labels\n\
  ```php\nRepeater::make('crashes')\n    ->schema([\n        TimePicker::make('time')->required(),\n\
  \        Textarea::make('description')->required(),\n    ])\n    ->itemLabel(fn\
  \ (array $state): ?string =>\n        isset($state['time'], $state['description'])\n\
  \            ? $state['time'] . ' \u2014 ' . \\Str::limit($state['description'],\
  \ 40)\n            : null\n    )\n    ->collapsible()\n    ->collapsed()\n    ->addActionLabel('Add\
  \ crash moment'),\n```\n\n### Collapsible Secondary Section\n```php\nSection::make('Notes')\n\
  \    ->icon('heroicon-o-pencil')\n    ->schema([\n        Textarea::make('notes')\n\
  \            ->placeholder('Any remarks about today \u2014 medication, weather,\
  \ mood...')\n            ->rows(4),\n    ])\n    ->collapsible()\n    ->collapsed()\
  \  // hidden by default \u2014 most days have no notes\n    ->columnSpanFull(),\n\
  ```\n\n### Navigation Optimization\n```php\n// In app/Providers/Filament/AdminPanelProvider.php\n\
  public function panel(Panel $panel): Panel\n{\n    return $panel\n        ->navigationGroups([\n\
  \            NavigationGroup::make('Shop Management')\n                ->icon('heroicon-o-shopping-bag'),\n\
  \            NavigationGroup::make('Users & Permissions')\n                ->icon('heroicon-o-users'),\n\
  \            NavigationGroup::make('System')\n                ->icon('heroicon-o-cog-6-tooth')\n\
  \                ->collapsed(),\n        ]);\n}\n```\n\n### Dynamic Conditional\
  \ Fields\n```php\nForms\\Components\\Select::make('type')\n    ->options(['physical'\
  \ => 'Physical', 'digital' => 'Digital'])\n    ->live(),\n\nForms\\Components\\\
  TextInput::make('weight')\n    ->hidden(fn (Get $get) => $get('type') !== 'physical')\n\
  \    ->required(fn (Get $get) => $get('type') === 'physical'),\n```"
