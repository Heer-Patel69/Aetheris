benchmarks: "### Structural Impact (primary)\n- The form requires **less vertical\
  \ scrolling** than before \u2014 sections are side by side or behind tabs\n- Rating\
  \ inputs are **range sliders or compact grids**, not rows of 10 radio buttons\n\
  - Repeater entries show **meaningful labels**, not \"Item 1 / Item 2\"\n- Sections\
  \ that are empty by default are **collapsed**, reducing visual noise\n- The edit\
  \ form shows a **summary of key values** at the top without opening any section\n\
  \n### Optimization Excellence (secondary)\n- Time to complete a standard task reduced\
  \ by at least 20%\n- No primary fields require scrolling to reach\n- All existing\
  \ tests still pass after restructuring\n\n### Quality Standards\n- No page loads\
  \ slower than before\n- Interface is fully responsive on tablets\n- No fields were\
  \ accidentally dropped during restructuring"
