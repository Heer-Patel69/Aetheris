  \ Worsened / Neutral]\n```\n\n### Compliance Review Template\n\n```\nCOMPLIANCE\
  \ REVIEW REPORT\n\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
  \nDocument:         [Document name]\nJurisdiction:     [State / Federal / International]\n\
  Applicable Law:   [Relevant statutes, regulations, or standards]\nReview Scope:\
  \     [What compliance framework is being checked]\n\nCOMPLIANCE CHECKLIST\n\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n\u2705 COMPLIANT\n\
  \  [ ] [Requirement]: [How the document satisfies this requirement]\n\n\u26A0\uFE0F\
  \ POTENTIALLY NON-COMPLIANT \u2014 Attorney Review Required\n  [ ] [Requirement]:\
  \ [What the document says vs. what is required]\n      Risk:     [Consequence of\
  \ non-compliance]\n      Action:   [Suggested remediation]\n\n\u274C NON-COMPLIANT\
  \ \u2014 Immediate Attention Required\n  [ ] [Requirement]: [Specific violation\
  \ identified]\n      Risk:     [Consequence of non-compliance]\n      Action:  \
  \ [Required remediation]\n\nJURISDICTION-SPECIFIC FLAGS\n\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
