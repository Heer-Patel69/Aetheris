  \ \u2014 Clauses or provisions removed\n\nMATERIAL CHANGES \u2014 DETAILED ANALYSIS\n\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nChange #1: [Section\
  \ / Clause Title]\n  Version A:   \"[Original language]\"\n  Version B:   \"[Revised\
  \ language]\"\n  Impact:      [What changed and why it matters]\n  Favorable:  \
  \ [Favorable to our client / Unfavorable / Neutral]\n  Recommended: [Accept / Reject\
  \ / Counter-propose]\n\nChange #2: [Section / Clause Title]\n  [Same structure]\n\
  \nADDITIONS \u2014 NEW PROVISIONS\n\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
