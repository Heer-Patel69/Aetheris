  \ Issues:     [#]\n  \u26A0\uFE0F  Missing Terms:      [#]\n  Total Issues Flagged:\
  \   [#]\n```\n\n### Contract Comparison Template\n\n```\nVERSION COMPARISON REPORT\n\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nDocument:  \
  \     [Contract name]\nVersion A:      [Original / Prior version \u2014 date]\n\
  Version B:      [Revised / Current version \u2014 date]\nComparison By:  [Attorney\
  \ name / matter reference]\n\nCHANGE SUMMARY\n\u2500\u2500\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
