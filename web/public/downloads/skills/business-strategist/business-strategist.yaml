name: Business Strategist
outputs: "### Competitive Analysis Framework\n\n```\nCOMPETITIVE LANDSCAPE ASSESSMENT\n\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nMARKET DEFINITION\n\
  \  Who is the customer? [Segment definition \u2014 don't say \"everyone\"]\n  What\
  \ job are they hiring this product/service to do?\n  What is the relevant competitive\
  \ set? [Direct / Indirect / Substitutes]\n\nCOMPETITOR PROFILES (repeat for each\
  \ key competitor)\n\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
  \nCompany:            [Name]\nRevenue / Scale:    [Size, growth rate if known]\n\
  Business model:     [How they make money]\nTarget segment:     [Who they primarily\
  \ serve]\nValue proposition:  [What they claim to offer]\nKey strengths:      [What\
  \ they genuinely do well]\nKey weaknesses:     [Where they are vulnerable]\nStrategic\
  \ direction:[Where they appear to be heading]\nThreat level:       High / Medium\
  \ / Low \u2014 and why\n\nCOMPETITIVE POSITIONING MAP\n  Axes: [Choose 2 dimensions\
  \ most relevant to customer purchase decisions]\n  Plot: Your organization + each\
  \ key competitor\n  Identify: White space, crowded segments, your current vs. ideal\
  \ position\n\nPORTER'S FIVE FORCES SUMMARY\n  Threat of new entrants:     High /\
  \ Medium / Low \u2014 [key factors]\n  Supplier power:             High / Medium\
  \ / Low \u2014 [key factors]\n  Buyer power:                High / Medium / Low\
  \ \u2014 [key factors]\n  Threat of substitutes:      High / Medium / Low \u2014\
  \ [key factors]\n  Competitive rivalry:        High / Medium / Low \u2014 [key factors]\n\
  \  Overall industry attractiveness: [Synthesis]\n\nCOMPETITIVE ADVANTAGE ASSESSMENT\n\
  \  Our claimed advantage:      [What we say differentiates us]\n  Is it real?  \
  \               [Evidence it's actually valued by customers]\n  Is it defensible?\
  \           [Why can't competitors replicate it?]\n  How long will it last?    \
  \  [Durability assessment]\n  What would destroy it?      [Key risks to the moat]\n\
  ```\n\n### Market Entry Framework\n\n```\nMARKET ENTRY ASSESSMENT\n\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nMARKET SIZING\n  TAM (Total Addressable\
  \ Market):\n    [All spending on this problem/category globally]\n    Methodology:\
  \ [Top-down from industry data / Bottom-up from unit economics]\n    Source: [Data\
  \ source and year]\n\n  SAM (Serviceable Addressable Market):\n    [Portion of TAM\
  \ reachable with current model and geography]\n\n  SOM (Serviceable Obtainable Market):\n\
  \    [Realistic capture in 3-5 years given competition and resources]\n    Assumption:\
  \ [X% market share because Y]\n\nMARKET ATTRACTIVENESS\n  Growth rate:        [CAGR\
  \ \u2014 is the market expanding or contracting?]\n  Profitability:      [Industry\
  \ margins \u2014 is there money to be made?]\n  Competition:        [Fragmented\
  \ / Consolidated \u2014 and what that means]\n  Regulation:         [Regulatory\
  \ barriers to entry or ongoing compliance burden]\n  Customer dynamics:  [How customers\
  \ buy, switch costs, loyalty patterns]\n\nENTRY OPTIONS ANALYSIS\n  Option 1 \u2014\
  \ [Entry mode: e.g., organic build]:\n    Investment required:  $[range]\n    Time\
  \ to revenue:      [months]\n    Risk level:           High / Medium / Low\n   \
  \ Key assumption:       [The one thing that must be true for this to work]\n\n \
  \ Option 2 \u2014 [Entry mode: e.g., acquisition]:\n    Investment required:  $[range]\n\
  \    Time to revenue:      [months]\n    Risk level:           High / Medium / Low\n\
  \    Key assumption:       [The one thing that must be true for this to work]\n\n\
  \  Option 3 \u2014 [Entry mode: e.g., partnership/licensing]:\n    Investment required:\
  \  $[range]\n    Time to revenue:      [months]\n    Risk level:           High\
  \ / Medium / Low\n    Key assumption:       [The one thing that must be true for\
  \ this to work]\n\nRECOMMENDATION\n  Recommended entry mode:     [Which option and\
  \ why]\n  Beachhead segment:          [Start here \u2014 specific, narrow, winnable]\n\
  \  Go-to-market approach:      [How you reach and convert first customers]\n  Key\
  \ milestones:             [What success looks like at 6, 12, 24 months]\n  Decision\
  \ gates:             [What must be true to continue investing]\n```\n\n### Business\
  \ Model Design Framework\n\n```\nBUSINESS MODEL CANVAS\n\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\nCUSTOMER SEGMENTS\n  Who are we creating\
  \ value for?\n  Primary: [Specific description \u2014 not \"businesses\" or \"consumers\"\
  ]\n  Secondary: [If applicable]\n  Segment prioritization rationale: [Why this segment\
  \ first?]\n\nVALUE PROPOSITIONS\n  What value do we deliver?\n  What customer problem\
  \ are we solving?\n  What customer need are we satisfying?\n  Core value proposition:\
  \ [One sentence \u2014 clear, specific, testable]\n  Supporting proof points: [Evidence\
  \ this is real value]\n\nCHANNELS\n  How do we reach our customer segments?\n  Awareness:\
  \ [How customers discover us]\n  Evaluation: [How customers assess us vs. alternatives]\n\
  \  Purchase: [How customers buy]\n  Delivery: [How we deliver the value]\n  After-sale:\
  \ [How we retain and grow]\n\nCUSTOMER RELATIONSHIPS\n  What type of relationship\
  \ does each segment expect?\n  [Self-service / Dedicated / Community / Automated]\n\
  \  Acquisition cost: $[CAC]\n  Retention mechanism: [What keeps customers from leaving]\n\
  \nREVENUE STREAMS\n  What are customers willing to pay for?\n  Revenue model: [Subscription\
  \ / Transaction / Usage / Licensing / Other]\n  Pricing strategy: [Value-based /\
  \ Cost-plus / Competitive / Freemium]\n  Unit economics:\n    ARPU / ACV: $[amount]\n\
  \    Gross margin: [%]\n    LTV: $[amount]\n    CAC: $[amount]\n    LTV:CAC ratio:\
  \ [X:1] \u2014 target \u2265 3:1\n\nKEY RESOURCES\n  What assets are required?\n\
  \  Physical: [Facilities, equipment]\n  Intellectual: [IP, data, brand, proprietary\
  \ processes]\n  Human: [Key talent, specialized expertise]\n  Financial: [Capital\
  \ requirements]\n\nKEY ACTIVITIES\n  What must we do exceptionally well?\n  [The\
  \ 3-5 activities that are truly core to delivering value]\n\nKEY PARTNERSHIPS\n\
  \  Who are our key suppliers and partners?\n  What do we get from them vs. build\
  \ ourselves?\n  Partnership risk: [What happens if a key partner fails?]\n\nCOST\
  \ STRUCTURE\n  What are the most important costs?\n  Fixed vs. variable breakdown\n\
  \  Largest cost drivers\n  Unit economics: [Cost to serve one customer]\n  Path\
  \ to profitability: [When and how]\n```\n\n### SWOT & Strategic Options Framework\n\
  \n```\nSTRATEGIC SITUATION ASSESSMENT\n\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\nSTRENGTHS (Internal \u2014 what we do well)\n  1. [Specific\
  \ strength \u2014 with evidence]\n  2. [Specific strength \u2014 with evidence]\n\
  \  3. [Specific strength \u2014 with evidence]\n  Key question: Which strengths\
  \ are genuinely distinctive vs. table stakes?\n\nWEAKNESSES (Internal \u2014 where\
  \ we fall short)\n  1. [Specific weakness \u2014 with evidence]\n  2. [Specific\
  \ weakness \u2014 with evidence]\n  3. [Specific weakness \u2014 with evidence]\n\
  \  Key question: Which weaknesses are strategic vulnerabilities vs. addressable\
  \ gaps?\n\nOPPORTUNITIES (External \u2014 favorable conditions)\n  1. [Specific\
  \ opportunity \u2014 sized and timebound]\n  2. [Specific opportunity \u2014 sized\
  \ and timebound]\n  3. [Specific opportunity \u2014 sized and timebound]\n  Key\
  \ question: Which opportunities are real vs. speculative?\n\nTHREATS (External \u2014\
  \ unfavorable conditions)\n  1. [Specific threat \u2014 with probability and impact\
  \ assessment]\n  2. [Specific threat \u2014 with probability and impact assessment]\n\
  \  3. [Specific threat \u2014 with probability and impact assessment]\n  Key question:\
  \ Which threats require immediate action vs. monitoring?\n\nSTRATEGIC OPTIONS (derived\
  \ from SWOT intersections)\n  SO Strategies (Strengths \xD7 Opportunities \u2014\
  \ pursue aggressively):\n    [Use strength X to capture opportunity Y]\n\n  ST Strategies\
  \ (Strengths \xD7 Threats \u2014 defend and differentiate):\n    [Use strength X\
  \ to neutralize threat Y]\n\n  WO Strategies (Weaknesses \xD7 Opportunities \u2014\
  \ invest to compete):\n    [Address weakness X to capture opportunity Y]\n\n  WT\
  \ Strategies (Weaknesses \xD7 Threats \u2014 mitigate and stabilize):\n    [Address\
  \ weakness X to reduce exposure to threat Y]\n\nSTRATEGIC PRIORITY RECOMMENDATION\n\
  \  Given the above, the highest-priority strategic moves are:\n  1. [Action] \u2014\
  \ because [rationale] \u2014 by [timeline]\n  2. [Action] \u2014 because [rationale]\
  \ \u2014 by [timeline]\n  3. [Action] \u2014 because [rationale] \u2014 by [timeline]\n\
  ```\n\n### Scenario Planning Framework\n\n```\nSCENARIO ANALYSIS\n\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nKEY UNCERTAINTIES\n  Identify\
  \ the 2 most important variables that are:\n  a) Highly uncertain (can't predict\
  \ with confidence)\n  b) Highly impactful (would significantly change the strategy)\n\
  \n  Variable 1: [e.g., regulatory environment]\n    Range: [Favorable] \u2190\u2014\
  \u2014\u2014\u2014\u2192 [Restrictive]\n\n  Variable 2: [e.g., market adoption rate]\n\
  \    Range: [Rapid] \u2190\u2014\u2014\u2014\u2014\u2192 [Slow]\n\nSCENARIO MATRIX\
  \ (2\xD72)\n  \u250C\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u252C\u2500\u2500\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510\n  \u2502\
  \  Scenario A     \u2502  Scenario B     \u2502\n  \u2502  [Name]         \u2502\
  \  [Name]         \u2502\n  \u2502                 \u2502                 \u2502\
  \n  \u251C\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u253C\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2524\n  \u2502  Scenario\
  \ C     \u2502  Scenario D     \u2502\n  \u2502  [Name]         \u2502  [Name] \
  \        \u2502\n  \u2502                 \u2502                 \u2502\n  \u2514\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2534\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518\n\nFOR EACH SCENARIO:\n  Description:\
  \      [What the world looks like in this scenario]\n  Probability:      [Estimated\
  \ likelihood \u2014 must sum to ~100%]\n  Revenue impact:   [$X or X% vs. base case]\n\
  \  Strategic implication: [What it means for our strategy]\n  Early indicators:\
  \ [What signals would tell us this scenario is emerging?]\n\nROBUST STRATEGY IDENTIFICATION\n\
  \  Which strategic moves perform well across ALL scenarios?\n  \u2192 These are\
  \ your core, unconditional bets\n\n  Which strategic moves are scenario-dependent?\n\
  \  \u2192 These require decision gates tied to early indicators\n\n  What options/hedges\
  \ should we preserve regardless of scenario?\n  \u2192 These are your strategic\
  \ flexibility investments\n```\n\n### Business Case Framework\n\n```\nBUSINESS CASE\
  \ STRUCTURE\n\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n\
  EXECUTIVE SUMMARY (1 page)\n  Decision required: [Specific, binary \u2014 approve\
  \ or reject]\n  Investment required: $[amount] over [period]\n  Expected return:\
  \ $[NPV] / [IRR]% / [payback period]\n  Recommendation: [Proceed / Do not proceed\
  \ / Proceed with conditions]\n  Decision deadline: [Date \u2014 and why it matters]\n\
  \nTHE OPPORTUNITY\n  Problem or opportunity being addressed\n  Strategic fit with\
  \ organizational priorities\n  Consequences of not acting (the \"do nothing\" option)\n\
  \nTHE SOLUTION\n  What is being proposed, specifically\n  Why this approach vs.\
  \ alternatives considered\n  Key assumptions the analysis depends on\n\nFINANCIAL\
  \ ANALYSIS\n  Investment: $[one-time] + $[ongoing per year]\n  Revenue/savings:\
  \ $[Year 1] / $[Year 2] / $[Year 3]\n  Net cash flow by year: [Table]\n  NPV at\
  \ [X]% discount rate: $[amount]\n  IRR: [%]\n  Payback period: [months]\n\nRISK\
  \ ASSESSMENT\n  Key risk 1: [Description] \u2014 Probability: H/M/L \u2014 Impact:\
  \ H/M/L\n    Mitigation: [How we reduce this risk]\n  Key risk 2: [Same structure]\n\
  \  Key risk 3: [Same structure]\n  Sensitivity: [What if the key assumption is wrong\
  \ by 20%?]\n\nIMPLEMENTATION\n  Timeline: [Phases and milestones]\n  Resources required:\
  \ [People, capital, systems]\n  Dependencies: [What must happen first]\n  Decision\
  \ gates: [At what points can we stop if things aren't working?]\n\nRECOMMENDATION\
  \ & NEXT STEPS\n  Recommended decision with rationale\n  Next steps if approved\
  \ \u2014 by whom, by when\n```\n\n---"
