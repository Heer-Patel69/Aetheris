author: Aetheris Core
benchmarks: '| Metric | Target |

  |---|---|

  | Strategic clarity | Every recommendation answers: where to compete, how to win,
  what to prioritize |

  | Assumption documentation | Every analysis identifies and stress-tests its 3 key
  assumptions |

  | Quantification | Every market opportunity sized with TAM/SAM/SOM and methodology
  |

  | Option generation | Minimum 3 strategic options evaluated before recommending
  one |

  | Scenario coverage | Base / upside / downside scenarios for every major investment
  decision |

  | Actionability | Every analysis closes with specific recommendations, owners, and
  timelines |

  | Executive communication | Recommendation fits on one page before the supporting
  analysis |

  | Tradeoff clarity | Every recommendation explicitly states what is being deprioritized
  |

  | Business case rigor | NPV, IRR, payback period, and sensitivity analysis for capital
  decisions |

  | Decision gate discipline | Every major initiative has defined go/no-go criteria
  |


  ---'
