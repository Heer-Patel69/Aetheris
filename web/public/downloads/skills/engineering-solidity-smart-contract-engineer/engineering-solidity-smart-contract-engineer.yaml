outputs: "### ERC-20 Token with Access Control\n```solidity\n// SPDX-License-Identifier:\
  \ MIT\npragma solidity ^0.8.24;\n\nimport {ERC20} from \"@openzeppelin/contracts/token/ERC20/ERC20.sol\"\
  ;\nimport {ERC20Burnable} from \"@openzeppelin/contracts/token/ERC20/extensions/ERC20Burnable.sol\"\
  ;\nimport {ERC20Permit} from \"@openzeppelin/contracts/token/ERC20/extensions/ERC20Permit.sol\"\
  ;\nimport {AccessControl} from \"@openzeppelin/contracts/access/AccessControl.sol\"\
  ;\nimport {Pausable} from \"@openzeppelin/contracts/utils/Pausable.sol\";\n\n///\
  \ @title ProjectToken\n/// @notice ERC-20 token with role-based minting, burning,\
  \ and emergency pause\n/// @dev Uses OpenZeppelin v5 contracts \u2014 no custom\
  \ crypto\ncontract ProjectToken is ERC20, ERC20Burnable, ERC20Permit, AccessControl,\
  \ Pausable {\n    bytes32 public constant MINTER_ROLE = keccak256(\"MINTER_ROLE\"\
  );\n    bytes32 public constant PAUSER_ROLE = keccak256(\"PAUSER_ROLE\");\n\n  \
  \  uint256 public immutable MAX_SUPPLY;\n\n    error MaxSupplyExceeded(uint256 requested,\
  \ uint256 available);\n\n    constructor(\n        string memory name_,\n      \
  \  string memory symbol_,\n        uint256 maxSupply_\n    ) ERC20(name_, symbol_)\
  \ ERC20Permit(name_) {\n        MAX_SUPPLY = maxSupply_;\n\n        _grantRole(DEFAULT_ADMIN_ROLE,\
  \ msg.sender);\n        _grantRole(MINTER_ROLE, msg.sender);\n        _grantRole(PAUSER_ROLE,\
  \ msg.sender);\n    }\n\n    /// @notice Mint tokens to a recipient\n    /// @param\
  \ to Recipient address\n    /// @param amount Amount of tokens to mint (in wei)\n\
  \    function mint(address to, uint256 amount) external onlyRole(MINTER_ROLE) {\n\
  \        if (totalSupply() + amount > MAX_SUPPLY) {\n            revert MaxSupplyExceeded(amount,\
  \ MAX_SUPPLY - totalSupply());\n        }\n        _mint(to, amount);\n    }\n\n\
  \    function pause() external onlyRole(PAUSER_ROLE) {\n        _pause();\n    }\n\
  \n    function unpause() external onlyRole(PAUSER_ROLE) {\n        _unpause();\n\
  \    }\n\n    function _update(\n        address from,\n        address to,\n  \
  \      uint256 value\n    ) internal override whenNotPaused {\n        super._update(from,\
  \ to, value);\n    }\n}\n```\n\n### UUPS Upgradeable Vault Pattern\n```solidity\n\
  // SPDX-License-Identifier: MIT\npragma solidity ^0.8.24;\n\nimport {UUPSUpgradeable}\
  \ from \"@openzeppelin/contracts-upgradeable/proxy/utils/UUPSUpgradeable.sol\";\n\
  import {OwnableUpgradeable} from \"@openzeppelin/contracts-upgradeable/access/OwnableUpgradeable.sol\"\
  ;\nimport {ReentrancyGuardUpgradeable} from \"@openzeppelin/contracts-upgradeable/utils/ReentrancyGuardUpgradeable.sol\"\
  ;\nimport {PausableUpgradeable} from \"@openzeppelin/contracts-upgradeable/utils/PausableUpgradeable.sol\"\
  ;\nimport {IERC20} from \"@openzeppelin/contracts/token/ERC20/IERC20.sol\";\nimport\
  \ {SafeERC20} from \"@openzeppelin/contracts/token/ERC20/utils/SafeERC20.sol\";\n\
  \n/// @title StakingVault\n/// @notice Upgradeable staking vault with timelock withdrawals\n\
  /// @dev UUPS proxy pattern \u2014 upgrade logic lives in implementation\ncontract\
  \ StakingVault is\n    UUPSUpgradeable,\n    OwnableUpgradeable,\n    ReentrancyGuardUpgradeable,\n\
  \    PausableUpgradeable\n{\n    using SafeERC20 for IERC20;\n\n    struct StakeInfo\
  \ {\n        uint128 amount;       // Packed: 128 bits\n        uint64 stakeTime;\
  \     // Packed: 64 bits \u2014 good until year 584 billion\n        uint64 lockEndTime;\
  \   // Packed: 64 bits \u2014 same slot as above\n    }\n\n    IERC20 public stakingToken;\n\
  \    uint256 public lockDuration;\n    uint256 public totalStaked;\n    mapping(address\
  \ => StakeInfo) public stakes;\n\n    event Staked(address indexed user, uint256\
  \ amount, uint256 lockEndTime);\n    event Withdrawn(address indexed user, uint256\
  \ amount);\n    event LockDurationUpdated(uint256 oldDuration, uint256 newDuration);\n\
  \n    error ZeroAmount();\n    error LockNotExpired(uint256 lockEndTime, uint256\
  \ currentTime);\n    error NoStake();\n\n    /// @custom:oz-upgrades-unsafe-allow\
  \ constructor\n    constructor() {\n        _disableInitializers();\n    }\n\n \
  \   function initialize(\n        address stakingToken_,\n        uint256 lockDuration_,\n\
  \        address owner_\n    ) external initializer {\n        __UUPSUpgradeable_init();\n\
  \        __Ownable_init(owner_);\n        __ReentrancyGuard_init();\n        __Pausable_init();\n\
  \n        stakingToken = IERC20(stakingToken_);\n        lockDuration = lockDuration_;\n\
  \    }\n\n    /// @notice Stake tokens into the vault\n    /// @param amount Amount\
  \ of tokens to stake\n    function stake(uint256 amount) external nonReentrant whenNotPaused\
  \ {\n        if (amount == 0) revert ZeroAmount();\n\n        // Effects before\
  \ interactions\n        StakeInfo storage info = stakes[msg.sender];\n        info.amount\
  \ += uint128(amount);\n        info.stakeTime = uint64(block.timestamp);\n     \
  \   info.lockEndTime = uint64(block.timestamp + lockDuration);\n        totalStaked\
  \ += amount;\n\n        emit Staked(msg.sender, amount, info.lockEndTime);\n\n \
  \       // Interaction last \u2014 SafeERC20 handles non-standard returns\n    \
  \    stakingToken.safeTransferFrom(msg.sender, address(this), amount);\n    }\n\n\
  \    /// @notice Withdraw staked tokens after lock period\n    function withdraw()\
  \ external nonReentrant {\n        StakeInfo storage info = stakes[msg.sender];\n\
  \        uint256 amount = info.amount;\n\n        if (amount == 0) revert NoStake();\n\
  \        if (block.timestamp < info.lockEndTime) {\n            revert LockNotExpired(info.lockEndTime,\
  \ block.timestamp);\n        }\n\n        // Effects before interactions\n     \
  \   info.amount = 0;\n        info.stakeTime = 0;\n        info.lockEndTime = 0;\n\
  \        totalStaked -= amount;\n\n        emit Withdrawn(msg.sender, amount);\n\
  \n        // Interaction last\n        stakingToken.safeTransfer(msg.sender, amount);\n\
  \    }\n\n    function setLockDuration(uint256 newDuration) external onlyOwner {\n\
  \        emit LockDurationUpdated(lockDuration, newDuration);\n        lockDuration\
  \ = newDuration;\n    }\n\n    function pause() external onlyOwner { _pause(); }\n\
  \    function unpause() external onlyOwner { _unpause(); }\n\n    /// @dev Only\
  \ owner can authorize upgrades\n    function _authorizeUpgrade(address) internal\
  \ override onlyOwner {}\n}\n```\n\n### Foundry Test Suite\n```solidity\n// SPDX-License-Identifier:\
  \ MIT\npragma solidity ^0.8.24;\n\nimport {Test, console2} from \"forge-std/Test.sol\"\
  ;\nimport {StakingVault} from \"../src/StakingVault.sol\";\nimport {ERC1967Proxy}\
  \ from \"@openzeppelin/contracts/proxy/ERC1967/ERC1967Proxy.sol\";\nimport {MockERC20}\
  \ from \"./mocks/MockERC20.sol\";\n\ncontract StakingVaultTest is Test {\n    StakingVault\
  \ public vault;\n    MockERC20 public token;\n    address public owner = makeAddr(\"\
  owner\");\n    address public alice = makeAddr(\"alice\");\n    address public bob\
  \ = makeAddr(\"bob\");\n\n    uint256 constant LOCK_DURATION = 7 days;\n    uint256\
  \ constant STAKE_AMOUNT = 1000e18;\n\n    function setUp() public {\n        token\
  \ = new MockERC20(\"Stake Token\", \"STK\");\n\n        // Deploy behind UUPS proxy\n\
  \        StakingVault impl = new StakingVault();\n        bytes memory initData\
  \ = abi.encodeCall(\n            StakingVault.initialize,\n            (address(token),\
  \ LOCK_DURATION, owner)\n        );\n        ERC1967Proxy proxy = new ERC1967Proxy(address(impl),\
  \ initData);\n        vault = StakingVault(address(proxy));\n\n        // Fund test\
  \ accounts\n        token.mint(alice, 10_000e18);\n        token.mint(bob, 10_000e18);\n\
  \n        vm.prank(alice);\n        token.approve(address(vault), type(uint256).max);\n\
  \        vm.prank(bob);\n        token.approve(address(vault), type(uint256).max);\n\
  \    }\n\n    function test_stake_updatesBalance() public {\n        vm.prank(alice);\n\
  \        vault.stake(STAKE_AMOUNT);\n\n        (uint128 amount,,) = vault.stakes(alice);\n\
  \        assertEq(amount, STAKE_AMOUNT);\n        assertEq(vault.totalStaked(),\
  \ STAKE_AMOUNT);\n        assertEq(token.balanceOf(address(vault)), STAKE_AMOUNT);\n\
  \    }\n\n    function test_withdraw_revertsBeforeLock() public {\n        vm.prank(alice);\n\
  \        vault.stake(STAKE_AMOUNT);\n\n        vm.prank(alice);\n        vm.expectRevert();\n\
  \        vault.withdraw();\n    }\n\n    function test_withdraw_succeedsAfterLock()\
  \ public {\n        vm.prank(alice);\n        vault.stake(STAKE_AMOUNT);\n\n   \
  \     vm.warp(block.timestamp + LOCK_DURATION + 1);\n\n        vm.prank(alice);\n\
  \        vault.withdraw();\n\n        (uint128 amount,,) = vault.stakes(alice);\n\
  \        assertEq(amount, 0);\n        assertEq(token.balanceOf(alice), 10_000e18);\n\
  \    }\n\n    function test_stake_revertsWhenPaused() public {\n        vm.prank(owner);\n\
  \        vault.pause();\n\n        vm.prank(alice);\n        vm.expectRevert();\n\
  \        vault.stake(STAKE_AMOUNT);\n    }\n\n    function testFuzz_stake_arbitraryAmount(uint128\
  \ amount) public {\n        vm.assume(amount > 0 && amount <= 10_000e18);\n\n  \
  \      vm.prank(alice);\n        vault.stake(amount);\n\n        (uint128 staked,,)\
  \ = vault.stakes(alice);\n        assertEq(staked, amount);\n    }\n}\n```\n\n###\
  \ Gas Optimization Patterns\n```solidity\n// SPDX-License-Identifier: MIT\npragma\
  \ solidity ^0.8.24;\n\n/// @title GasOptimizationPatterns\n/// @notice Reference\
  \ patterns for minimizing gas consumption\ncontract GasOptimizationPatterns {\n\
  \    // PATTERN 1: Storage packing \u2014 fit multiple values in one 32-byte slot\n\
  \    // Bad: 3 slots (96 bytes)\n    // uint256 id;      // slot 0\n    // uint256\
  \ amount;  // slot 1\n    // address owner;   // slot 2\n\n    // Good: 2 slots\
  \ (64 bytes)\n    struct PackedData {\n        uint128 id;       // slot 0 (16 bytes)\n\
  \        uint128 amount;   // slot 0 (16 bytes) \u2014 same slot!\n        address\
  \ owner;    // slot 1 (20 bytes)\n        uint96 timestamp; // slot 1 (12 bytes)\
  \ \u2014 same slot!\n    }\n\n    // PATTERN 2: Custom errors save ~50 gas per revert\
  \ vs require strings\n    error Unauthorized(address caller);\n    error InsufficientBalance(uint256\
  \ requested, uint256 available);\n\n    // PATTERN 3: Use mappings over arrays for\
  \ lookups \u2014 O(1) vs O(n)\n    mapping(address => uint256) public balances;\n\
  \n    // PATTERN 4: Cache storage reads in memory\n    function optimizedTransfer(address\
  \ to, uint256 amount) external {\n        uint256 senderBalance = balances[msg.sender];\
  \ // 1 SLOAD\n        if (senderBalance < amount) {\n            revert InsufficientBalance(amount,\
  \ senderBalance);\n        }\n        unchecked {\n            // Safe because of\
  \ the check above\n            balances[msg.sender] = senderBalance - amount;\n\
  \        }\n        balances[to] += amount;\n    }\n\n    // PATTERN 5: Use calldata\
  \ for read-only external array params\n    function processIds(uint256[] calldata\
  \ ids) external pure returns (uint256 sum) {\n        uint256 len = ids.length;\
  \ // Cache length\n        for (uint256 i; i < len;) {\n            sum += ids[i];\n\
  \            unchecked { ++i; } // Save gas on increment \u2014 cannot overflow\n\
  \        }\n    }\n\n    // PATTERN 6: Prefer uint256 / int256 \u2014 the EVM operates\
  \ on 32-byte words\n    // Smaller types (uint8, uint16) cost extra gas for masking\
  \ UNLESS packed in storage\n}\n```\n\n### Hardhat Deployment Script\n```typescript\n\
  import { ethers, upgrades } from \"hardhat\";\n\nasync function main() {\n  const\
  \ [deployer] = await ethers.getSigners();\n  console.log(\"Deploying with:\", deployer.address);\n\
  \n  // 1. Deploy token\n  const Token = await ethers.getContractFactory(\"ProjectToken\"\
  );\n  const token = await Token.deploy(\n    \"Protocol Token\",\n    \"PTK\",\n\
  \    ethers.parseEther(\"1000000000\") // 1B max supply\n  );\n  await token.waitForDeployment();\n\
  \  console.log(\"Token deployed to:\", await token.getAddress());\n\n  // 2. Deploy\
  \ vault behind UUPS proxy\n  const Vault = await ethers.getContractFactory(\"StakingVault\"\
  );\n  const vault = await upgrades.deployProxy(\n    Vault,\n    [await token.getAddress(),\
  \ 7 * 24 * 60 * 60, deployer.address],\n    { kind: \"uups\" }\n  );\n  await vault.waitForDeployment();\n\
  \  console.log(\"Vault proxy deployed to:\", await vault.getAddress());\n\n  //\
  \ 3. Grant minter role to vault if needed\n  // const MINTER_ROLE = await token.MINTER_ROLE();\n\
  \  // await token.grantRole(MINTER_ROLE, await vault.getAddress());\n}\n\nmain().catch((error)\
  \ => {\n  console.error(error);\n  process.exitCode = 1;\n});\n```"
